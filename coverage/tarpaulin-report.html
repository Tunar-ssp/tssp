<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

ation.\n    Status,\n    /// Run the first-use setup wizard.\n    Init,\n    /// Manage CLI configuration.\n    Config(ConfigCommand),\n    /// Generate a shell completion script.\n    #[command(hide = true)]\n    Completions(CompletionArgs),\n}\n\n/// Arguments for `tssp send`.\n#[derive(Debug, Args)]\npub struct SendArgs {\n    /// File to upload and send.\n    pub file: PathBuf,\n    /// Force QR mode instead of active phone-session delivery.\n    #[arg(long = \"qr\", visible_alias = \"qr\")]\n    pub qr: bool,\n    /// Attach a tag.\n    #[arg(long = \"tag\", short = 't', value_name = \"NAME\")]\n    pub tags: Vec\u003cString\u003e,\n}\n\n/// Arguments for `tssp receive`.\n#[derive(Debug, Args)]\npub struct ReceiveArgs {\n    /// Also download the received file to this local path.\n    #[arg(long, value_name = \"PATH\")]\n    pub save: Option\u003cPathBuf\u003e,\n    /// Maximum wait duration.\n    #[arg(long, value_name = \"DURATION\")]\n    pub timeout: Option\u003cString\u003e,\n}\n\n/// Arguments for `tssp paste`.\n#[derive(Debug, Args)]\npub struct PasteArgs {\n    /// Attach a tag.\n    #[arg(long = \"tag\", short = 't', value_name = \"NAME\")]\n    pub tags: Vec\u003cString\u003e,\n    /// Override the generated filename.\n    #[arg(long = \"as\", value_name = \"FILENAME\")]\n    pub filename: Option\u003cString\u003e,\n}\n\n/// Arguments for `tssp copy`.\n#[derive(Debug, Args)]\npub struct CopyArgs {\n    /// File id.\n    pub id: String,\n    /// Copy a short-lived share URL instead of direct content URL.\n    #[arg(long)]\n    pub share: bool,\n}\n\n/// Arguments for `tssp pull`.\n#[derive(Debug, Args)]\npub struct PullArgs {\n    /// File id or filename.\n    pub id_or_name: String,\n    /// Destination path.\n    #[arg(long, value_name = \"PATH\")]\n    pub output: Option\u003cPathBuf\u003e,\n    /// Replace an existing local file.\n    #[arg(long)]\n    pub overwrite: bool,\n    /// Download all filename matches.\n    #[arg(long)]\n    pub all: bool,\n}\n\n/// Arguments for `tssp list`.\n#[derive(Debug, Args)]\npub struct ListArgs {\n    /// Filter by tag. Repeated tags use AND semantics.\n    #[arg(long = \"tag\", value_name = \"NAME\")]\n    pub tags: Vec\u003cString\u003e,\n    /// Filter by MIME prefix.\n    #[arg(long = \"type\", value_name = \"MIME_PREFIX\")]\n    pub mime_prefix: Option\u003cString\u003e,\n    /// Filter by relative duration or ISO timestamp.\n    #[arg(long, value_name = \"WHEN\")]\n    pub since: Option\u003cString\u003e,\n    /// Page size.\n    #[arg(long, value_name = \"N\")]\n    pub limit: Option\u003cu16\u003e,\n    /// Sort field.\n    #[arg(long, value_name = \"FIELD\")]\n    pub sort: Option\u003cString\u003e,\n    /// Show pinned files only.\n    #[arg(long)]\n    pub pinned: bool,\n    /// Cursor for the next page.\n    #[arg(long, value_name = \"CURSOR\")]\n    pub page: Option\u003cString\u003e,\n}\n\n/// Arguments for `tssp last`.\n#[derive(Debug, Args)]\npub struct LastArgs {\n    /// Number of uploads to show.\n    #[arg(default_value_t = 10)]\n    pub count: u16,\n}\n\n/// Arguments for `tssp search`.\n#[derive(Debug, Args)]\npub struct SearchArgs {\n    /// Query text.\n    pub query: String,\n    /// Maximum number of results.\n    #[arg(long, value_name = \"N\")]\n    pub limit: Option\u003cu16\u003e,\n    /// Restrict to files with this tag.\n    #[arg(long = \"tag\", value_name = \"NAME\")]\n    pub tag: Option\u003cString\u003e,\n}\n\n/// Arguments for tag mutations.\n#[derive(Debug, Args)]\npub struct TagArgs {\n    /// File id.\n    pub id: String,\n    /// One or more tag names.\n    pub tags: Vec\u003cString\u003e,\n}\n\n/// Arguments for `tssp pin`.\n#[derive(Debug, Args)]\npub struct PinArgs {\n    /// File id.\n    pub id: String,\n    /// Insert at a specific pin position.\n    #[arg(long, value_name = \"N\")]\n    pub position: Option\u003cu32\u003e,\n}\n\n/// Arguments for `tssp remove`.\n#[derive(Debug, Args)]\npub struct RemoveArgs {\n    /// File id         .connect_timeout(CONNECT_TIMEOUT)\n        .timeout(READ_TIMEOUT)\n        .build()\n        .map_err(|error| format!(\"could not build HTTP client: {error}\"))?;\n    let response = client\n        .get(address.status_url())\n        .header(ACCEPT, \"application/vnd.tssp.v1+json\")\n        .send()\n        .map_err(|error| {\n            eprintln!(\n                \"error: could not reach daemon at {}: {error}\",\n                address.base_url()\n            );\n            CliExitCode::Network\n        });\n    let response = match response {\n        Ok(value) =\u003e value,\n        Err(code) =\u003e return Ok(code),\n    };\n\n    if response.status().is_server_error() {\n        eprintln!(\"error: daemon returned {}\", response.status());\n        return Ok(CliExitCode::Server);\n    }\n\n    if !response.status().is_success() {\n        eprintln!(\"error: daemon returned {}\", response.status());\n        return Ok(CliExitCode::Generic);\n    }\n\n    let status = response.json::\u003cDaemonStatus\u003e().map_err(|error| {\n        format!(\n            \"daemon at {} returned an invalid status response: {error}\",\n            address.base_url()\n        )\n    })?;\n    print_status(\u0026status, cli.output.json)?;\n    Ok(CliExitCode::Success)\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\nstruct BackendAddress {\n    host: String,\n    port: u16,\n}\n\nimpl BackendAddress {\n    fn from_connection_args(args: \u0026ConnectionArgs) -\u003e Result\u003cSelf, String\u003e {\n        let host = args.host.as_deref().unwrap_or(DEFAULT_HOST).trim();\n        if host.is_empty() {\n            return Err(\"host must not be empty\".to_owned());\n        }\n        if host.contains('/') {\n            return Err(\"host must not contain a URL path\".to_owned());\n        }\n\n        Ok(Self {\n            host: host.to_owned(),\n            port: args.port.unwrap_or(DEFAULT_PORT),\n        })\n    }\n\n    fn base_url(\u0026self) -\u003e String {\n        format!(\"http://{}:{}\", self.host, self.port)\n    }\n\n    fn status_url(\u0026self) -\u003e String {\n        format!(\"{}/api/v1/status\", self.base_url())\n    }\n}\n\n#[derive(Debug, Deserialize, Serialize)]\nstruct DaemonStatus {\n    schema_version: u8,\n    version: String,\n    status: String,\n    uptime_seconds: u64,\n    file_count: u64,\n    tag_count: u64,\n    pinned_count: u64,\n    recent_upload_count_24h: u64,\n}\n\nfn print_status(status: \u0026DaemonStatus, json: bool) -\u003e Result\u003c(), String\u003e {\n    if json {\n        let encoded = serde_json::to_string(status)\n            .map_err(|error| format!(\"could not encode status JSON: {error}\"))?;\n        println!(\"{encoded}\");\n        return Ok(());\n    }\n\n    println!(\"OK tsspd {}\", status.version);\n    println!(\"Status: {}\", status.status);\n    println!(\"Uptime: {}s\", status.uptime_seconds);\n    println!(\"Files: {}\", status.file_count);\n    println!(\"Tags: {}\", status.tag_count);\n    println!(\"Pinned: {}\", status.pinned_count);\n    println!(\"Uploaded in last 24h: {}\", status.recent_upload_count_24h);\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{BackendAddress, DEFAULT_PORT};\n    use tssp::ConnectionArgs;\n\n    #[test]\n    fn default_status_url_uses_local_daemon() {\n        let address = BackendAddress::from_connection_args(\u0026ConnectionArgs {\n            host: None,\n            port: None,\n        })\n        .unwrap_or_else(|error| panic!(\"address failed: {error}\"));\n\n        assert_eq!(address.status_url(), \"http://127.0.0.1:8421/api/v1/status\");\n    }\n\n    #[test]\n    fn explicit_host_and_port_override_defaults() {\n        let address = BackendAddress::from_connection_args(\u0026ConnectionArgs {\n            host: Some(\"tsspd.local\".to_owned()),\n            port: Some(9000),\n        })\n        .unwrap_or_else(|error| panic!(\"address failed: {error}\"));\n\n        assert_eq!(address.base_url(), \"http://tsspd.local:9000\");\n    }\n\n    #[test]\n    fn host_must_not_include_path() {\n        let address = BackendAddress::from_connection_args(\u0026ConnectionArgs {\n            host: Some(\"127.0.0.1/api\".to_owned()),\n            port: Some(DEFAULT_PORT),\n        });\n\n        assert!(address.is_err());\n    }\n}\n","traces":[{"line":17,"address":[6999312,7001747,7001504],"length":1,"stats":{"Line":0}},{"line":18,"address":[6999357],"length":1,"stats":{"Line":0}},{"line":19,"address":[6999815,6999630,7001745,6999873],"length":1,"stats":{"Line":0}},{"line":20,"address":[6999712],"length":1,"stats":{"Line":0}},{"line":21,"address":[6999742],"length":1,"stats":{"Line":0}},{"line":23,"address":[6999841,6999792],"length":1,"stats":{"Line":0}},{"line":24,"address":[7000092],"length":1,"stats":{"Line":0}},{"line":25,"address":[7000010,7000085],"length":1,"stats":{"Line":0}},{"line":26,"address":[7000111],"length":1,"stats":{"Line":0}},{"line":28,"address":[7014996,7014720,7015002],"length":1,"stats":{"Line":0}},{"line":29,"address":[7014798],"length":1,"stats":{"Line":0}},{"line":31,"address":[7014748],"length":1,"stats":{"Line":0}},{"line":35,"address":[7000213],"length":1,"stats":{"Line":0}},{"line":36,"address":[7000324],"length":1,"stats":{"Line":0}},{"line":37,"address":[7000246],"length":1,"stats":{"Line":0}},{"line":40,"address":[7000427,7000369],"length":1,"stats":{"Line":0}},{"line":41,"address":[7001520,7000492],"length":1,"stats":{"Line":0}},{"line":42,"address":[7001637],"length":1,"stats":{"Line":0}},{"line":45,"address":[7000472,7000512],"length":1,"stats":{"Line":0}},{"line":46,"address":[7000640,7000557],"length":1,"stats":{"Line":0}},{"line":47,"address":[7000757],"length":1,"stats":{"Line":0}},{"line":50,"address":[7014488,7014494,7014160],"length":1,"stats":{"Line":0}},{"line":51,"address":[7014248],"length":1,"stats":{"Line":0}},{"line":53,"address":[7014195],"length":1,"stats":{"Line":0}},{"line":56,"address":[7001175,7001261],"length":1,"stats":{"Line ystem implementation of content-addressed blob storage.\n//!\n//! Bytes are streamed into a temporary file while BLAKE3 is computed. Completed\n//! files are moved into a fanout path based on the content hash, so identical\n//! content shares one stored blob.\n\nuse std::fs::{self, File, OpenOptions};\nuse std::io::{Read, Write};\nuse std::path::{Path, PathBuf};\nuse std::time::{SystemTime, UNIX_EPOCH};\n\nuse tssp_domain::{ContentHash, FileSize, StorageHandle};\nuse tssp_ports::{BlobStore, BlobStoreError, BlobWriteOutcome};\n\nconst BUFFER_SIZE: usize = 64 * 1024;\nconst TEMP_DIR: \u0026str = \"tmp\";\nconst BLOB_DIR: \u0026str = \"blobs\";\n\n/// Filesystem-backed content-addressed blob store.\n#[derive(Debug, Clone)]\npub struct FilesystemBlobStore {\n    root: PathBuf,\n}\n\nimpl FilesystemBlobStore {\n    /// Creates a store rooted at `root`.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`BlobStoreError`] when the required directory structure cannot\n    /// be created.\n    pub fn new(root: impl Into\u003cPathBuf\u003e) -\u003e Result\u003cSelf, BlobStoreError\u003e {\n        let store = Self { root: root.into() };\n        store.ensure_layout()?;\n        Ok(store)\n    }\n\n    /// Returns the configured storage root.\n    #[must_use]\n    pub fn root(\u0026self) -\u003e \u0026Path {\n        \u0026self.root\n    }\n\n    fn ensure_layout(\u0026self) -\u003e Result\u003c(), BlobStoreError\u003e {\n        create_dir_all(self.root.join(TEMP_DIR))?;\n        create_dir_all(self.root.join(BLOB_DIR))?;\n        Ok(())\n    }\n\n    fn create_temp_file(\u0026self) -\u003e Result\u003c(PathBuf, File), BlobStoreError\u003e {\n        let temp_dir = self.root.join(TEMP_DIR);\n        for attempt in 0..100_u32 {\n            let path = temp_dir.join(temp_name(attempt));\n            match OpenOptions::new().write(true).create_new(true).open(\u0026path) {\n                Ok(file) =\u003e return Ok((path, file)),\n                Err(error) if error.kind() == std::io::ErrorKind::AlreadyExists =\u003e {}\n                Err(error) =\u003e {\n                    return Err(BlobStoreError::WriteFailed {\n                        message: error.to_string(),\n                    });\n                }\n            }\n        }\n\n        Err(BlobStoreError::WriteFailed {\n            message: \"could not allocate a unique temporary blob path\".to_owned(),\n        })\n    }\n\n    fn permanent_path(\u0026self, hash: \u0026ContentHash) -\u003e Result\u003cPathBuf, BlobStoreError\u003e {\n        let fanout = fanout(hash)?;\n        Ok(self\n            .root\n            .join(BLOB_DIR)\n            .join(fanout.first)\n            .join(fanout.second)\n            .join(hash.as_str()))\n    }\n\n    fn handle_for_hash(hash: \u0026ContentHash) -\u003e Result\u003cStorageHandle, BlobStoreError\u003e {\n        let fanout = fanout(hash)?;\n        StorageHandle::new(format!(\n            \"{BLOB_DIR}/{}/{}/{}\",\n            fanout.first,\n            fanout.second,\n            hash.as_str()\n        ))\n        .map_err(|error| BlobStoreError::WriteFailed {\n            message: error.to_string(),\n        })\n    }\n\n    fn path_for_handle(\u0026self, handle: \u0026StorageHandle) -\u003e Result\u003cPathBuf, BlobStoreError\u003e {\n        let mut path = self.root.clone();\n        for component in handle.as_str().split('/') {\n            if component.is_empty() || component == \".\" || component == \"..\" {\n                return Err(BlobStoreError::WriteFailed {\n                    message: \"invalid storage handle component\".to_owned(),\n                });\n            }\n            path.push(component);\n        }\n        Ok(path)\n    }\n}\n\nimpl BlobStore for FilesystemBlobStore {\n    fn put_stream(\u0026self, source: \u0026mut dyn Read) -\u003e Result\u003cBlobWriteOutcome, BlobStoreError\u003e {\n        let (temp_path, mut temp_file) = self.create_temp_file()?;\n        let stream_result = stream_to_temp(source, \u0026mut temp_file);\n        let (content_hash, size) = match stream_result {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e {\n                remove_file_best_effort(\u0026temp_path);\n                return Err(error);\n            }\n        };\n\n        if let Err(error) = temp_file.sync_all() {\n            remove_file_best_effort(\u0026temp_path);\n            return Err(BlobStoreError::WriteFailed {\n                message: error.to_string(),\n            });\n        }\n        drop(temp_file);\n\n        let permanent_path = self.permanent_path(\u0026content_hash)?;\n        let parent = permanent_path\n            .parent()\n            .ok_or_else(|| BlobStoreError::WriteFailed {\n                message: \"blob path has no parent directory\".to_owned(),\n            })?;\n        create_dir_all(parent)?;\n\n        let deduplicated = if permanent_path.exists() {\n            remove_file_best_effort(\u0026temp_path);\n            true\n        } else {\n            rename_file(\u0026temp_path, \u0026permanent_path)?;\n            sync_directory(parent)?;\n            false\n        };\n\n        Ok(BlobWriteOutcome {\n            content_hash: content_hash.clone(),\n            handle: Self::handle_for_hash(\u0026content_hash)?,\n            size,\n            deduplicated,\n        })\n    }\n\n    fn cleanup_unreferenced(\u0026self, handle: \u0026StorageHandle) -\u003e Result\u003c(), BlobStoreError\u003e {\n        let path = self.path_for_handle(handle)?;\n        match fs::remove_file(path) {\n            Ok(()) =\u003e Ok(()),\n            Err(error) if error.kind() == std::io::ErrorKind::NotFound =\u003e Ok(()),\n            Err(error) =\u003e Err(BlobStoreError::CleanupFailed {\n                handle: handle.clone(),\n                message: error.to_string(),\n            }),\n        }\n    }\n}\n\nfn stream_to_temp(\n    source: \u0026mut dyn Read,\n    temp_file: \u0026mut File,\n) -\u003e Result\u003c(ContentHash, FileSize), BlobStoreError\u003e {\n    let mut hasher = blake3::Hasher::new();\n    let mut size = 0_u64;\n    let mut buffer = vec![0_u8; BUFFER_SIZE];\n\n    loop {\n        let bytes_read = source\n            .read(\u0026mut buffer)\n            .map_err(|error| BlobStoreError::ReadFailed {\n                message: error.to_string(),\n            })?;\n        if bytes_read == 0 {\n            break;\n        }\n\n        let chunk = \u0026buffer[..bytes_read];\n        hasher.update(chunk);\n        temp_file\n            .write_all(chunk)\n            .map_err(|error| BlobStoreError::WriteFailed {\n                message: error.to_string(),\n            })?;\n        size = size\n            .checked_add(u64::try_from(bytes_read).unwrap_or(u64::MAX))\n            .ok_or_else(|| BlobStoreError::WriteFailed {\n                message: \"blob size overflow\".to_owned(),\n            })?;\n    }\n\n    let hex = hasher.finalize().to_hex();\n    let hash = ContentHash::new(hex.as_str()).map_err(|error| BlobStoreError::WriteFailed {\n        message: error.to_string(),\n    })?;\n\n    Ok((hash, FileSize::new(size)))\n}\n\nfn create_dir_all(path: impl AsRef\u003cPath\u003e) -\u003e Result\u003c(), BlobStoreError\u003e {\n    fs::create_dir_all(path).map_err(|error| BlobStoreError::WriteFailed {\n        message: error.to_string(),\n    })\n}\n\nfn rename_file(from: \u0026Path, to: \u0026Path) -\u003e Result\u003c(), BlobStoreError\u003e {\n    fs::rename(from, to).map_err(|error| BlobStoreError::WriteFailed {\n        message: error.to_string(),\n    })\n}\n\nfn sync_directory(path: \u0026Path) -\u003e Result\u003c(), BlobStoreError\u003e {\n    File::open(path)\n        .and_then(|directory| directory.sync_all())\n        .map_err(|error| BlobStoreError::WriteFailed {\n            message: error.to_string(),\n        })\n}\n\nfn remove_file_best_effort(path: \u0026Path) {\n    let _ignored = fs::remove_file(path);\n}\n\nstruct Fanout\u003c'a\u003e {\n    first: \u0026'a str,\n    second: \u0026'a str,\n}\n\nfn fanout(hash: \u0026ContentHash) -\u003e Result\u003cFanout\u003c'_\u003e, BlobStoreError\u003e {\n    let value = hash.as_str();\n    let first = value.get(0..2).ok_or_else(|| BlobStoreError::WriteFailed {\n        message: \"content hash missing first fanout component\".to_owned(),\n    })?;\n    let second = value.get(2..4).ok_or_else(|| BlobStoreError::WriteFailed {\n        message: \"content hash missing second fanout component\".to_owned(),\n    })?;\n    Ok(Fanout { first, second })\n}\n\nfn temp_name(attempt: u32) -\u003e String {\n    let nanos = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .map_or(0, |duration| duration.as_nanos());\n    format!(\"upload-{}-{nanos}-{attempt}.tmp\", std::process::id())\n}\n\n#[cfg(test)]\nmod tests {\n    use std::fs;\n    use std::io::Cursor;\n\n    use tempfile::tempdir;\n    use tssp_ports::BlobStore;\n\n    use super::FilesystemBlobStore;\n\n    #[test]\n    fn put_stream_stores_content_by_hash() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let store = FilesystemBlobStore::new(temp.path())\n            .unwrap_or_else(|error| panic!(\"store init failed: {error}\"));\n        let mut source = Cursor::new(b\"hello world\".as_slice());\n\n        let outcome = store\n            .put_stream(\u0026mut source)\n            .unwrap_or_else(|error| panic!(\"put stream failed: {error}\"));\n\n        assert_eq!(outcome.size.bytes(), 11);\n        assert!(!outcome.deduplicated);\n        assert!(temp.path().join(outcome.handle.as_str()).is_file());\n    }\n\n    #[test]\n    fn put_stream_deduplicates_identical_content() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let store = FilesystemBlobStore::new(temp.path())\n            .unwrap_or_else(|error| panic!(\"store init failed: {error}\"));\n        let mut first = Cursor::new(b\"same\".as_slice());\n        let first_outcome = store\n            .put_stream(\u0026mut first)\n            .unwrap_or_else(|error| panic!(\"first put failed: {error}\"));\n        let mut second = Cursor::new(b\"same\".as_slice());\n\n        let second_outcome = store\n            .put_stream(\u0026mut second)\n            .unwrap_or_else(|error| panic!(\"second put failed: {error}\"));\n\n        assert_eq!(first_outcome.handle, second_outcome.handle);\n        assert!(second_outcome.deduplicated);\n    }\n\n    #[test]\n    fn cleanup_unreferenced_removes_existing_blob() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let store = FilesystemBlobStore::new(temp.path())\n            .unwrap_or_else(|error| panic!(\"store init failed: {error}\"));\n        let mut source = Cursor::new(b\"delete me\".as_slice());\n        let outcome = store\n            .put_stream(\u0026mut source)\n            .unwrap_or_else(|error| panic!(\"put stream failed: {error}\"));\n        let path = temp.path().join(outcome.handle.as_str());\n\n        store\n            .cleanup_unreferenced(\u0026outcome.handle)\n            .unwrap_or_else(|error| panic!(\"cleanup failed: {error}\"));\n\n        assert!(!path.exists());\n    }\n\n    #[test]\n    fn empty_file_is_stored_normally() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let store = FilesystemBlobStore::new(temp.path())\n            .unwrap_or_else(|error| panic!(\"store init failed: {error}\"));\n        let mut source = Cursor::new([].as_slice());\n\n        let outcome = store\n            .put_stream(\u0026mut source)\n            .unwrap_or_else(|error| panic!(\"put stream failed: {error}\"));\n\n        assert_eq!(outcome.size.bytes(), 0);\n        assert!(fs::read(temp.path().join(outcome.handle.as_str()))\n            .unwrap_or_else(|error| panic!(\"read failed: {error}\"))\n            .is_empty());\n    }\n}\n","traces 003e Result\u003cSelf, SqliteRepositoryError\u003e {\n        let connection = Connection::open(path).map_err(SqliteRepositoryError::Open)?;\n        configure_connection(\u0026connection)?;\n        run_integrity_check(\u0026connection)?;\n        run_migrations(\u0026connection)?;\n        Ok(Self {\n            connection: Mutex::new(connection),\n        })\n    }\n\n    /// Opens an in-memory `SQLite` database for tests.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`SqliteRepositoryError`] when the database cannot be configured\n    /// or migrated.\n    pub fn open_in_memory() -\u003e Result\u003cSelf, SqliteRepositoryError\u003e {\n        let connection = Connection::open_in_memory().map_err(SqliteRepositoryError::Open)?;\n        configure_connection(\u0026connection)?;\n        run_integrity_check(\u0026connection)?;\n        run_migrations(\u0026connection)?;\n        Ok(Self {\n            connection: Mutex::new(connection),\n        })\n    }\n\n    fn lock(\u0026self) -\u003e Result\u003cMutexGuard\u003c'_, Connection\u003e, RepositoryError\u003e {\n        self.connection\n            .lock()\n            .map_err(|error| RepositoryError::OperationFailed {\n                message: format!(\"metadata connection lock is poisoned: {error}\"),\n            })\n    }\n}\n\nimpl FileRepository for SqliteFileRepository {\n    fn insert_file(\u0026self, new_file: NewFileRecord) -\u003e Result\u003cFileRecord, RepositoryError\u003e {\n        let inserted_id = new_file.id.clone();\n        let mut connection = self.lock()?;\n        let transaction = connection\n            .transaction()\n            .map_err(map_rusqlite_repository_error)?;\n        insert_file_row(\u0026transaction, \u0026new_file)?;\n        insert_tags(\u0026transaction, \u0026new_file)?;\n        transaction\n            .commit()\n            .map_err(map_rusqlite_repository_error)?;\n        drop(connection);\n\n        self.find_file(\u0026inserted_id)?\n            .ok_or_else(|| RepositoryError::OperationFailed {\n                message: \"inserted file could not be read back\".to_owned(),\n            })\n    }\n\n    fn find_file(\u0026self, id: \u0026FileId) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n        let connection = self.lock()?;\n        let mut statement = connection\n            .prepare(\n                \"SELECT id, name, size_bytes, content_hash, mime_type, storage_handle, uploaded_at, pinned_at\n                 FROM files\n                 WHERE id = ?1\",\n            )\n            .map_err(map_rusqlite_repository_error)?;\n        let mut rows = statement\n            .query(params![id.as_str()])\n            .map_err(map_rusqlite_repository_error)?;\n        let Some(row) = rows.next().map_err(map_rusqlite_repository_error)? else {\n            return Ok(None);\n        };\n\n        let mut record = map_file_row(row)?;\n        record.tags = load_tags(\u0026connection, id)?;\n        Ok(Some(record))\n    }\n\n    fn find_file_by_content_hash(\n        \u0026self,\n        content_hash: \u0026ContentHash,\n    ) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n        let connection = self.lock()?;\n        let mut statement = connection\n            .prepare(\n                \"SELECT id, name, size_bytes, content_hash, mime_type, storage_handle, uploaded_at, pinned_at\n                 FROM files\n                 WHERE content_hash = ?1\n                 ORDER BY uploaded_at ASC, id ASC\n                 LIMIT 1\",\n            )\n            .map_err(map_rusqlite_repository_error)?;\n        let mut rows = statement\n            .query(params![content_hash.as_str()])\n            .map_err(map_rusqlite_repository_error)?;\n        let Some(row) = rows.next().map_err(map_rusqlite_repository_error)? else {\n            return Ok(None);\n        };\n\n        let mut record = map_file_row(row)?;\n        let id = record.id.clone();\n        record.tags = load_tags(\u0026connection, \u0026id)?;\n        Ok(Some(record))\n    }\n\n    fn stats_since(\u0026self, recent_since: UnixTimestamp) -\u003e Result\u003cRepositoryStats, RepositoryError\u003e {\n        let connection = self.lock()?;\n        Ok(RepositoryStats {\n            file_count: count(\u0026connection, \"SELECT COUNT(*) FROM files\", [])?,\n            tag_count: count(\u0026connection, \"SELECT COUNT(*) FROM tags\", [])?,\n            pinned_count: count(\n                \u0026connection,\n                \"SELECT COUNT(*) FROM files WHERE pinned_at IS NOT NULL\",\n                [],\n            )?,\n            recent_upload_count: count(\n                \u0026connection,\n                \"SELECT COUNT(*) FROM files WHERE uploaded_at \u003e= ?1\",\n                params![recent_since.seconds()],\n            )?,\n        })\n    }\n}\n\n/// Errors raised while opening or migrating the `SQLite` adapter.\n#[derive(Debug, Error)]\npub enum SqliteRepositoryError {\n    /// `SQLite` open failed.\n    #[error(\"could not open sqlite database: {0}\")]\n    Open(rusqlite::Error),\n\n    /// `SQLite` setup failed.\n    #[error(\"could not configure sqlite database: {0}\")]\n    Configure(rusqlite::Error),\n\n    /// Database integrity check failed.\n    #[error(\"sqlite integrity check failed: {message}\")]\n    Integrity {\n        /// Integrity failure message.\n        message: String,\n    },\n\n    /// Migration failed.\n    #[error(\"could not migrate sqlite database: {0}\")]\n    Migration(rusqlite::Error),\n}\n\nfn configure_connection(connection: \u0026Connection) -\u003e Result\u003c(), SqliteRepositoryError\u003e {\n    connection\n        .pragma_update(None, \"journal_mode\", \"WAL\")\n        .map_err(SqliteRepositoryError::Configure)?;\n    connection\n        .pragma_update(None, \"synchronous\", \"NORMAL\")\n        .map_err(SqliteRepositoryError::Configure)?;\n    connection\n        .pragma_update(None, \"foreign_keys\", \"ON\")\n        .map_err(SqliteRepositoryError::Configure)?;\n    connection\n        .busy_timeout(std::time::Duration::from_secs(5))\n        .map_err(SqliteRepositoryError::Configure)\n}\n\nfn run_integrity_check(connection: \u0026Connection) -\u003e Result\u003c(), SqliteRepositoryError\u003e {\n    let result: String = connection\n        .query_row(\"PRAGMA integrity_check\", [], |row| row.get(0))\n        .map_err(SqliteRepositoryError::Configure)?;\n    if result == \"ok\" {\n        return Ok(());\n    }\n\n    Err(SqliteRepositoryError::Integrity { message: result })\n}\n\nfn run_migrations(connection: \u0026Connection) -\u003e Result\u003c(), SqliteRepositoryError\u003e {\n    connection\n        .execute_batch(\n            \"\n            CREATE TABLE IF NOT EXISTS schema_migrations (\n                version INTEGER PRIMARY KEY,\n                applied_at TEXT NOT NULL DEFAULT CURRENT_TIMESTAMP\n            );\n\n            CREATE TABLE IF NOT EXISTS files (\n                id TEXT PRIMARY KEY,\n                name TEXT NOT NULL,\n                storage_component TEXT NOT NULL,\n                size_bytes INTEGER NOT NULL CHECK (size_bytes \u003e= 0),\n                content_hash TEXT NOT NULL,\n                mime_type TEXT NOT NULL,\n                storage_handle TEXT NOT NULL,\n                uploaded_at INTEGER NOT NULL,\n                pinned_at INTEGER\n            );\n\n            CREATE TABLE IF NOT EXISTS tags (\n                key TEXT PRIMARY KEY,\n                display TEXT NOT NULL\n            );\n\n            CREATE TABLE IF NOT EXISTS file_tags (\n                file_id TEXT NOT NULL REFERENCES files(id) ON DELETE CASCADE,\n                tag_key TEXT NOT NULL REFERENCES tags(key) ON DELETE CASCADE,\n                PRIMARY KEY (file_id, tag_key)\n            );\n\n            CREATE VIRTUAL TABLE IF NOT EXISTS file_search\n                USING fts5(file_id UNINDEXED, name, tags);\n\n            INSERT OR IGNORE INTO schema_migrations (version) VALUES (1);\n            \",\n        )\n        .map_err(SqliteRepositoryError::Migration)\n}\n\nfn insert_file_row(\n    transaction: \u0026rusqlite::Transaction\u003c'_\u003e,\n    new_file: \u0026NewFileRecord,\n) -\u003e Result\u003c(), RepositoryError\u003e {\n    let size =\n        i64::try_from(new_file.size.bytes()).map_err(|error| RepositoryError::OperationFailed {\n            message: format!(\"file size does not fit sqlite integer: {error}\"),\n        })?;\n    transaction\n        .execute(\n            \"INSERT INTO files\n             (id, name, storage_component, size_bytes, content_hash, mime_type, storage_handle, uploaded_at, pinned_at)\n             VALUES (?1, ?2, ?3, ?4, ?5, ?6, ?7, ?8, ?9)\",\n            params![\n                new_file.id.as_str(),\n                new_file.name.original(),\n                new_file.name.storage_component(),\n                size,\n                new_file.content_hash.as_str(),\n                new_file.mime_type.as_str(),\n                new_file.storage_handle.as_str(),\n                new_file.uploaded_at.seconds(),\n                new_file.pinned_at,\n            ],\n        )\n        .map(|_rows| ())\n        .map_err(map_rusqlite_repository_error)\n}\n\nfn insert_tags(\n    transaction: \u0026rusqlite::Transaction\u003c'_\u003e,\n    new_file: \u0026NewFileRecord,\n) -\u003e Result\u003c(), RepositoryError\u003e {\n    for tag in \u0026new_file.tags {\n        transaction\n            .execute(\n                \"INSERT OR IGNORE INTO tags (key, display) VALUES (?1, ?2)\",\n                params![tag.key().as_str(), tag.display()],\n            )\n            .map_err(map_rusqlite_repository_error)?;\n        transaction\n            .execute(\n                \"INSERT OR IGNORE INTO file_tags (file_id, tag_key) VALUES (?1, ?2)\",\n                params![new_file.id.as_str(), tag.key().as_str()],\n            )\n            .map_err(map_rusqlite_repository_error)?;\n    }\n    Ok(())\n}\n\nfn load_tags(connection: \u0026Connection, id: \u0026FileId) -\u003e Result\u003cVec\u003cTag\u003e, RepositoryError\u003e {\n    let mut statement = connection\n        .prepare(\n            \"SELECT tags.display\n             FROM tags\n             JOIN file_tags ON file_tags.tag_key = tags.key\n             WHERE file_tags.file_id = ?1\n             ORDER BY tags.key\",\n        )\n        .map_err(map_rusqlite_repository_error)?;\n    let mapped = statement\n        .query_map(params![id.as_str()], |row| row.get::\u003c_, String\u003e(0))\n        .map_err(map_rusqlite_repository_error)?;\n\n    let mut tags = Vec::new();\n    for tag in mapped {\n        let display = tag.map_err(map_rusqlite_repository_error)?;\n        tags.push(Tag::new(display).map_err(|error| map_domain_repository_error(\u0026error))?);\n    }\n    Ok(tags)\n}\n\nfn count\u003cP\u003e(connection: \u0026Connection, sql: \u0026str, params: P) -\u003e Result\u003cu64, RepositoryError\u003e\nwhere\n    P: rusqlite::Params,\n{\n    let count: i64 = connection\n        .query_row(sql, params, |row| row.get(0))\n        .map_err(map_rusqlite_repository_error)?;\n    u64::try_from(count).map_err(|error| RepositoryError::OperationFailed {\n        message: format!(\"metadata count is invalid: {error}\"),\n    })\n}\n\nfn map_file_row(row: \u0026Row\u003c'_\u003e) -\u003e Result\u003cFileRecord, RepositoryError\u003e {\n    let id: String = row.get(0).map_err(map_rusqlite_repository_error)?;\n    let name: String = row.get(1).map_err(map_rusqlite_repository_error)?;\n    let size: i64 = row.get(2).map_err(map_rusqlite_repository_error)?;\n    let content_hash: String = row.get(3).map_err(map_rusqlite_repository_error)?;\n    let mime_type: String = row.get(4).map_err(map_rusqlite_repository_error)?;\n    let storage_handle: String = row.get(5).map_err(map_rusqlite_repository_error)?;\n    let uploaded_at: i64 = row.get(6).map_err(map_rusqlite_repository_error)?;\n    let pinned_at_raw: Option\u003ci64\u003e = row.get(7).map_err(map_rusqlite_repository_error)?;\n    let size = u64::try_from(size).map_err(|error| RepositoryError::OperationFailed {\n        message: format!(\"stored file size is invalid: {error}\"),\n    })?;\n    let pinned_at = pinned_at_raw\n        .map(u32::try_from)\n        .transpose()\n        .map_err(|error| RepositoryError::OperationFailed {\n            message: format!(\"stored pin position is invalid: {error}\"),\n        })?;\n\n    Ok(FileRecord {\n        id: FileId::new(id).map_err(|error| map_domain_repository_error(\u0026error))?,\n        name: FileName::new(name).map_err(|error| map_domain_repository_error(\u0026error))?,\n        size: FileSize::new(size),\n        content_hash: ContentHash::new(content_hash)\n            .map_err(|error| map_domain_repository_error(\u0026error))?,\n        mime_type: MimeType::new(mime_type).map_err(|error| map_domain_repository_error(\u0026error))?,\n        storage_handle: StorageHandle::new(storage_handle)\n            .map_err(|error| map_domain_repository_error(\u0026error))?,\n        uploaded_at: UnixTimestamp::new(uploaded_at)\n            .map_err(|error| map_domain_repository_error(\u0026error))?,\n        tags: Vec::new(),\n        pinned_at,\n    })\n}\n\nfn map_domain_repository_error(error: \u0026tssp_domain::DomainError) -\u003e RepositoryError {\n    RepositoryError::OperationFailed {\n        message: error.to_string(),\n    }\n}\n\nfn map_rusqlite_repository_error(error: rusqlite::Error) -\u003e RepositoryError {\n    match error {\n        rusqlite::Error::SqliteFailure(failure, _message)\n            if failure.code == ErrorCode::DatabaseBusy\n                || failure.code == ErrorCode::DatabaseLocked =\u003e\n        {\n            RepositoryError::Busy\n        }\n        rusqlite::Error::SqliteFailure(failure, message)\n            if failure.code == ErrorCode::ConstraintViolation =\u003e\n        {\n            RepositoryError::Conflict {\n                message: message.unwrap_or_else(|| \"constraint violation\".to_owned()),\n            }\n        }\n        other =\u003e RepositoryError::OperationFailed {\n            message: other.to_string(),\n        },\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use tempfile::tempdir;\n    use tssp_domain::{\n        ContentHash, FileId, FileName, FileSize, MimeType, StorageHandle, Tag, UnixTimestamp,\n    };\n    use tssp_ports::{FileRepository, NewFileRecord, RepositoryError};\n\n    use super::SqliteFileRepository;\n\n    #[test]\n    fn open_file_database_runs_migrations() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let path = temp.path().join(\"metadata.sqlite3\");\n\n        let repository = SqliteFileRepository::open(path);\n\n        assert!(repository.is_ok());\n    }\n\n    #[test]\n    fn insert_and_find_file_roundtrips_metadata_and_tags() {\n        let repository = SqliteFileRepository::open_in_memory()\n            .unwrap_or_else(|error| panic!(\"repository open failed: {error}\"));\n        let file = new_file(\"file-1\", \u0026[\"Docs\", \"family photos\"], 1_700_000_000);\n\n        let inserted = repository\n            .insert_file(file)\n            .unwrap_or_else(|error| panic!(\"insert failed: {error}\"));\n        let found = repository\n            .find_file(\u0026inserted.id)\n            .unwrap_or_else(|error| panic!(\"find failed: {error}\"));\n\n        assert!(matches!(\n            found,\n            Some(record) if record.id.as_str() == \"file-1\"\n                \u0026\u0026 record.name.original() == \"report.pdf\"\n                \u0026\u0026 record.tags.len() == 2\n                \u0026\u0026 record.pinned_at == Some(2)\n        ));\n    }\n\n    #[test]\n    fn duplicate_file_id_returns_conflict() {\n        let repository = SqliteFileRepository::open_in_memory()\n            .unwrap_or_else(|error| panic!(\"repository open failed: {error}\"));\n        repository\n            .insert_file(new_file(\"file-1\", \u0026[], 1_700_000_000))\n            .unwrap_or_else(|error| panic!(\"insert failed: {error}\"));\n\n        let duplicate = repository.insert_file(new_file(\"file-1\", \u0026[], 1_700_000_000));\n\n        assert!(matches!(duplicate, Err(RepositoryError::Conflict { .. })));\n    }\n\n    #[test]\n    fn missing_file_returns_none() {\n        let repository = SqliteFileRepository::open_in_memory()\n            .unwrap_or_else(|error| panic!(\"repository open failed: {error}\"));\n        let missing = repository\n            .find_file(\u0026file_id(\"missing\"))\n            .unwrap_or_else(|error| panic!(\"find failed: {error}\"));\n\n        assert!(missing.is_none());\n    }\n\n    #[test]\n    fn find_file_by_content_hash_returns_oldest_matching_record() {\n        let repository = SqliteFileRepository::open_in_memory()\n            .unwrap_or_else(|error| panic!(\"repository open failed: {error}\"));\n        repository\n            .insert_file(new_file(\"file-2\", \u0026[\"new\"], 2_000))\n            .unwrap_or_else(|error| panic!(\"new insert failed: {error}\"));\n        repository\n            .insert_file(new_file(\"file-1\", \u0026[\"old\"], 1_000))\n            .unwrap_or_else(|error| panic!(\"old insert failed: {error}\"));\n\n        let found = repository\n            .find_file_by_content_hash(\u0026hash())\n            .unwrap_or_else(|error| panic!(\"hash lookup failed: {error}\"));\n\n        assert!(matches!(\n            found,\n            Some(record) if record.id.as_str() == \"file-1\"\n                \u0026\u0026 record.tags == vec![tag_value(\"old\")]\n        ));\n    }\n\n    #[test]\n    fn stats_since_counts_files_tags_pins_and_recent_uploads() {\n        let repository = SqliteFileRepository::open_in_memory()\n            .unwrap_or_else(|error| panic!(\"repository open failed: {error}\"));\n        repository\n            .insert_file(new_file(\"old\", \u0026[\"archive\"], 1_000))\n            .unwrap_or_else(|error| panic!(\"old insert failed: {error}\"));\n        repository\n            .insert_file(new_file(\"new\", \u0026[\"archive\", \"fresh\"], 2_000))\n            .unwrap_or_else(|error| panic!(\"new insert failed: {error}\"));\n\n        let stats = repository\n            .stats_since(timestamp(1_500))\n            .unwrap_or_else(|error| panic!(\"stats failed: {error}\"));\n\n        assert_eq!(stats.file_count, 2);\n        assert_eq!(stats.tag_count, 2);\n        assert_eq!(stats.pinned_count, 2);\n        assert_eq!(stats.recent_upload_count, 1);\n    }\n\n    fn new_file(id: \u0026str, tags: \u0026[\u0026str], uploaded_at: i64) -\u003e NewFileRecord {\n        NewFileRecord {\n            id: file_id(id),\n            name: filename(\"report.pdf\"),\n            size: FileSize::new(42),\n            content_hash: hash(),\n            mime_type: mime_type(\"application/pdf\"),\n            storage_handle: storage_handle(),\n            uploaded_at: timestamp(uploaded_at),\n            tags: tags.iter().map(|tag| tag_value(tag)).collect(),\n            pinned_at: Some(2),\n        }\n    }\n\n    fn file_id(value: \u0026str) -\u003e FileId {\n        FileId::new(value).unwrap_or_else(|error| panic!(\"invalid file id: {error}\"))\n    }\n\n    fn filename(value: \u0026str) -\u003e FileName {\n        FileName::new(value).unwrap_or_else(|error| panic!(\"invalid filename: {error}\"))\n    }\n\n    fn hash() -\u003e ContentHash {\n        ContentHash::new(\"abcdefabcdef0123456789abcdef0123456789abcdef0123456789abcdef0123\")\n            .unwrap_or_else(|error| panic!(\"invalid content hash: {error}\"))\n    }\n\n    fn mime_type(value: \u0026str) -\u003e MimeType {\n        MimeType::new(value).unwrap_or_else(|error| panic!(\"invalid mime type: {error}\"))\n    }\n\n    fn storage_handle() -\u003e StorageHandle {\n        StorageHandle::new(\"blobs/ab/cd/abcdef\")\n            .unwrap_or_else(|error| panic!(\"invalid storage handle: { "tssp","crates","tssp-adapter-system","src","lib.rs"],"content":"//! System adapters for clocks, file identifiers, and session tokens.\n\nuse std::time::{SystemTime, UNIX_EPOCH};\n\nuse base64::Engine;\nuse tssp_domain::{FileId, SessionToken, UnixTimestamp};\nuse tssp_ports::{Clock, IdGenerationError, IdGenerator, SessionTokenGenerator};\nuse uuid::Uuid;\n\n/// Clock backed by the host operating system.\n#[derive(Debug, Copy, Clone, Default)]\npub struct SystemClock;\n\nimpl Clock for SystemClock {\n    fn now(\u0026self) -\u003e UnixTimestamp {\n        let seconds = SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .map_or(0, |duration| duration.as_secs());\n        let seconds = i64::try_from(seconds).unwrap_or(i64::MAX);\n        match UnixTimestamp::new(seconds) {\n            Ok(timestamp) =\u003e timestamp,\n            Err(_error) =\u003e UnixTimestamp::max(),\n        }\n    }\n}\n\n/// File id generator using `UUIDv7` for sortable opaque ids.\n#[derive(Debug, Copy, Clone, Default)]\npub struct UuidV7FileIdGenerator;\n\nimpl IdGenerator for UuidV7FileIdGenerator {\n    fn new_file_id(\u0026self) -\u003e Result\u003cFileId, IdGenerationError\u003e {\n        FileId::new(Uuid::now_v7().to_string()).map_err(|error| IdGenerationError {\n            message: error.to_string(),\n        })\n    }\n}\n\n/// Session token generator using OS randomness and URL-safe base64.\n#[derive(Debug, Copy, Clone, Default)]\npub struct RandomSessionTokenGenerator;\n\nimpl SessionTokenGenerator for RandomSessionTokenGenerator {\n    fn new_session_token(\u0026self) -\u003e Result\u003cSessionToken, IdGenerationError\u003e {\n        let mut bytes = [0_u8; 16];\n        getrandom::getrandom(\u0026mut bytes).map_err(|error| IdGenerationError {\n            message: format!(\"secure random token generation failed: {error}\"),\n        })?;\n        let token = base64::engine::general_purpose::URL_SAFE_NO_PAD.encode(bytes);\n        SessionToken::new(token).map_err(|error| IdGenerationError {\n            message: error.to_string(),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use std::collections::BTreeSet;\n\n    use tssp_ports::{Clock, IdGenerator, SessionTokenGenerator};\n\n    use super::{RandomSessionTokenGenerator, SystemClock, UuidV7FileIdGenerator};\n\n    #[test]\n    fn system_clock_returns_supported_timestamp() {\n        let timestamp = SystemClock.now();\n\n        assert!(timestamp.seconds() \u003e 0);\n        assert!(timestamp.seconds_u64() \u003c= tssp_domain::UnixTimestamp::MAX_SECONDS);\n    }\n\n    #[test]\n    fn uuid_v7_file_ids_are_valid_and_distinct() {\n        let generator = UuidV7FileIdGenerator;\n        let first = generator\n            .new_file_id()\n            .unwrap_or_else(|error| panic!(\"first id failed: {error}\"));\n        let second = generator\n            .new_file_id()\n            .unwrap_or_else(|error| panic!(\"second id failed: {error}\"));\n\n        assert_ne!(first, second);\n        assert_eq!(first.as_str().len(), 36);\n    }\n\n    #[test]\n    fn session_tokens_are_valid_and_distinct() {\n        let generator = RandomSessionTokenGenerator;\n        let mut tokens = BTreeSet::new();\n\n        for _index in 0..8 {\n            let token = generator\n                .new_session_token()\n                .unwrap_or_else(|error| panic!(\"token failed: {error}\"));\n            assert_eq!(token.as_str().len(), 22);\n            tokens.insert(token.as_str().to_owned());\n        }\n\n        assert_eq!(tokens.len(), 8);\n    }\n}\n","traces":[{"line":15,"address":[4914096],"length":1,"stats":{"Line":2}},{"line":16,"address":[829135],"length":1,"stats":{"Line":2}},{"line":17,"address":[829150],"length":1,"stats":{"Line":2}},{"line":18,"address":[827280,827292],"length":1,"stats":{"Line":6}},{"line":19,"address":[4914174],"length":1,"stats":{"Line":2}},{"line":20,"address":[9242404],"length":1,"stats":{"Line":2}},{"line":21,"address":[829302],"length":1,"stats":{"Line":2}},{"line":22,"address":[9242439],"length":1,"stats":{"Line":0}},{"line":32,"address":[9242704],"length":1,"stats":{"Line":2}},{"line":33,"address":[827312,827346],"length":1,"stats":{"Line":2}},{"line":34,"address":[827326],"length":1,"stats":{"Line":0}},{"line":44,"address":[4913664],"length":1,"stats":{"Line":1}},{"line":45,"address":[9241881],"length":1,"stats":{"Line":1}},{"line":46,"address":[9247120,9247239],"length":1,"stats":{"Line":1}},{"line":47,"address":[826913],"length":1,"stats":{"Line":0}},{"line":49,"address":[828873],"length":1,"stats":{"Line":1}},{"line":50,"address":[827056,827090],"length":1,"stats":{"Line":1}},{"line":51,"address":[827070],"length":1,"stats":{"Line":0}}],"covered":14,"coverable":18},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tssp-app","src","lib.rs"],"content":"//! Application services for backend use cases.\n//!\n//! Services in this crate orchestrate domain values and ports. They own use-case\n//! ordering and cleanup rules but do not know whether persistence is `SQLite`,\n//! files are local, or delivery is HTTP.\n\nmod upload;\n\npub use upload::{UploadError, UploadRequest, UploadResult, UploadService};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tssp-app","src","upload.rs"],"content":"//! Upload use case orchestration.\n\nuse std::io::Read;\n\nuse thiserror::Error;\nuse tssp_domain::{DomainError, FileName, FileRecord, MimeType, Tag};\nuse tssp_ports::{\n    BlobStore, BlobStoreError, Clock, FileRepository, IdGenerationError, IdGenerator,\n    NewFileRecord, RepositoryError,\n};\n\n/// Coordinates streaming blob storage and metadata insertion for one upload.\npub struct UploadService\u003cB, R, I, C\u003e {\n    blob_store: B,\n    repository: R,\n    id_generator: I,\n    clock: C,\n}\n\nimpl\u003cB, R, I, C\u003e UploadService\u003cB, R, I, C\u003e {\n    /// Creates an upload service from explicit infrastructure ports.\n    #[must_use]\n    pub const fn new(blob_store: B, repository: R, id_generator: I, clock: C) -\u003e Self {\n        Self {\n            blob_store,\n            repository,\n            id_generator,\n            clock,\n        }\n    }\n}\n\nimpl\u003cB, R, I, C\u003e UploadService\u003cB, R, I, C\u003e\nwhere\n    B: BlobStore,\n    R: FileRepository,\n    I: IdGenerator,\n    C: Clock,\n{\n    /// Streams an upload into storage, creates metadata, and cleans up on failure.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`UploadError`] when request metadata is invalid, id generation\n    /// fails, blob storage fails, or metadata commit fails.\n    pub fn upload(\u0026self, request: \u0026mut UploadRequest\u003c'_\u003e) -\u003e Result\u003cUploadResult, UploadError\u003e {\n        let name = FileName::new(request.filename)?;\n        let mime_type = request\n            .mime_type\n            .map(MimeType::new)\n            .transpose()?\n            .unwrap_or_else(MimeType::octet_stream);\n        let tags = normalize_tags(request.tags)?;\n        let blob = self.blob_store.put_stream(request.source)?;\n        if blob.deduplicated {\n            match self\n                .repository\n                .find_file_by_content_hash(\u0026blob.content_hash)\n            {\n                Ok(Some(record)) =\u003e {\n                    return Ok(UploadResult {\n                        record,\n                        deduplicated: true,\n                    });\n                }\n                Ok(None) =\u003e {}\n                Err(error) =\u003e return Err(UploadError::DedupLookup(error)),\n            }\n        }\n\n        let new_file = NewFileRecord {\n            id: self.id_generator.new_file_id()?,\n            name,\n            size: blob.size,\n            content_hash: blob.content_hash,\n            mime_type,\n            storage_handle: blob.handle.clone(),\n            uploaded_at: self.clock.now(),\n            tags,\n            pinned_at: request.pinned_at,\n        };\n\n        match self.repository.insert_file(new_file) {\n            Ok(record) =\u003e Ok(UploadResult {\n                record,\n                deduplicated: blob.deduplicated,\n            }),\n            Err(error) =\u003e {\n                let cleanup = if blob.deduplicated {\n                    None\n                } else {\n                    self.blob_store.cleanup_unreferenced(\u0026blob.handle).err()\n                };\n                Err(UploadError::commit_failed(error, cleanup))\n            }\n        }\n    }\n}\n\n/// Input for a single uploaded file.\npub struct UploadRequest\u003c'a\u003e {\n    /// User-facing filename supplied by the client.\n    pub filename: \u0026'a str,\n    /// Optional MIME type supplied or detected by the delivery layer.\n    pub mime_type: Option\u003c\u0026'a str\u003e,\n    /// Initial tags supplied by the client.\n    pub tags: \u0026'a [\u0026'a str],\n    /// Optional initial pin order.\n    pub pinned_at: Option\u003cu32\u003e,\n    /// Streaming content source.\n    pub source: \u0026'a mut dyn Read,\n}\n\n/// Successful upload result.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct UploadResult {\n    /// Created logical file record.\n    pub record: FileRecord,\n    /// True when blob bytes were already present.\n    pub deduplicated: bool,\n}\n\n/// Upload use-case failure.\n#[derive(Debug, Error)]\npub enum UploadError {\n    /// Invalid request metadata.\n    #[error(transparent)]\n    InvalidRequest(#[from] DomainError),\n\n    /// File id generation failed.\n    #[error(transparent)]\n    IdGeneration(#[from] IdGenerationError),\n\n    /// Blob storage failed before metadata commit.\n    #[error(transparent)]\n    BlobStore(#[from] BlobStoreError),\n\n    /// Metadata lookup for an existing deduplicated blob failed.\n    #[error(\"metadata deduplication lookup failed\")]\n    DedupLookup(RepositoryError),\n\n    /// Metadata commit failed after blob storage succeeded.\n    #[error(\"metadata commit failed after blob write\")]\n    CommitFailed {\n        /// Repository error that caused the failed commit.\n        repository: RepositoryError,\n        /// Cleanup error, if cleanup also failed.\n        cleanup: Option\u003cBlobStoreError\u003e,\n    },\n}\n\nimpl UploadError {\n    fn commit_failed(repository: RepositoryError, cleanup: Option\u003cBlobStoreError\u003e) -\u003e Self {\n        Self::CommitFailed {\n            repository,\n            cleanup,\n        }\n    }\n}\n\nfn normalize_tags(tags: \u0026[\u0026str]) -\u003e Result\u003cVec\u003cTag\u003e, DomainError\u003e {\n    let mut normalized = Vec::with_capacity(tags.len());\n    for tag in tags {\n        let parsed = Tag::new(tag)?;\n        if !normalized\n            .iter()\n            .any(|existing: \u0026Tag| existing.key() == parsed.key())\n        {\n            normalized.push(parsed);\n        }\n    }\n    Ok(normalized)\n}\n\n#[cfg(test)]\nmod tests {\n    use std::cell::RefCell;\n    use std::collections::VecDeque;\n    use std::io::{Cursor, Read};\n\n    use tssp_domain::{\n        ContentHash, FileId, FileName, FileRecord, FileSize, MimeType, StorageHandle, UnixTimestamp,\n    };\n    use tssp_ports::{\n        BlobStore, BlobStoreError, BlobWriteOutcome, Clock, FileRepository, IdGenerationError,\n        IdGenerator, NewFileRecord, RepositoryError, RepositoryStats,\n    };\n\n    use super::{UploadError, UploadRequest, UploadService};\n\n    struct FixedClock;\n\n    impl Clock for FixedClock {\n        fn now(\u0026self) -\u003e UnixTimestamp {\n            match UnixTimestamp::new(1_700_000_000) {\n                Ok(value) =\u003e value,\n                Err(error) =\u003e panic!(\"invalid fixed timestamp: {error}\"),\n            }\n        }\n    }\n\n    struct QueueIds {\n        ids: RefCell\u003cVecDeque\u003cFileId\u003e\u003e,\n    }\n\n    impl QueueIds {\n        fn new(ids: Vec\u003cFileId\u003e) -\u003e Self {\n            Self {\n                ids: RefCell::new(VecDeque::from(ids)),\n            }\n        }\n    }\n\n    impl IdGenerator for QueueIds {\n        fn new_file_id(\u0026self) -\u003e Result\u003cFileId, IdGenerationError\u003e {\n            match self.ids.borrow_mut().pop_front() {\n                Some(value) =\u003e Ok(value),\n                None =\u003e Err(IdGenerationError {\n                    message: \"id queue is empty\".to_owned(),\n                }),\n            }\n        }\n    }\n\n    struct FakeBlobStore {\n        outcome: BlobWriteOutcome,\n        cleanup_calls: RefCell\u003cVec\u003cStorageHandle\u003e\u003e,\n    }\n\n    impl BlobStore for FakeBlobStore {\n        fn put_stream(\u0026self, source: \u0026mut dyn Read) -\u003e Result\u003cBlobWriteOutcome, BlobStoreError\u003e {\n            let mut buffer = [0_u8; 8];\n            loop {\n                match source.read(\u0026mut buffer) {\n                    Ok(0) =\u003e break,\n                    Ok(_) =\u003e {}\n                    Err(error) =\u003e {\n                        return Err(BlobStoreError::ReadFailed {\n                            message: error.to_string(),\n                        });\n                    }\n                }\n            }\n            Ok(self.outcome.clone())\n        }\n\n        fn cleanup_unreferenced(\u0026self, handle: \u0026StorageHandle) -\u003e Result\u003c(), BlobStoreError\u003e {\n            self.cleanup_calls.borrow_mut().push(handle.clone());\n            Ok(())\n        }\n    }\n\n    struct FakeRepository {\n        failure: Option\u003cRepositoryError\u003e,\n        existing_by_hash: Option\u003cFileRecord\u003e,\n        insert_calls: RefCell\u003cusize\u003e,\n    }\n\n    impl FakeRepository {\n        fn ok() -\u003e Self {\n            Self {\n                failure: None,\n                existing_by_hash: None,\n                insert_calls: RefCell::new(0),\n            }\n        }\n\n        fn failing(error: RepositoryError) -\u003e Self {\n            Self {\n                failure: Some(error),\n                existing_by_hash: None,\n                insert_calls: RefCell::new(0),\n            }\n        }\n\n        fn with_existing(existing: FileRecord) -\u003e Self {\n            Self {\n                failure: None,\n                existing_by_hash: Some(existing),\n                insert_calls: RefCell::new(0),\n            }\n        }\n    }\n\n    impl FileRepository for FakeRepository {\n        fn insert_file(\u0026self, new_file: NewFileRecord) -\u003e Result\u003cFileRecord, RepositoryError\u003e {\n            *self.insert_calls.borrow_mut() += 1;\n            if let Some(error) = \u0026self.failure {\n                return Err(clone_repository_error(error));\n            }\n\n            Ok(FileRecord {\n                id: new_file.id,\n                name: new_file.name,\n                size: new_file.size,\n                content_hash: new_file.content_hash,\n                mime_type: new_file.mime_type,\n                storage_handle: new_file.storage_handle,\n                uploaded_at: new_file.uploaded_at,\n                tags: new_file.tags,\n                pinned_at: new_file.pinned_at,\n            })\n        }\n\n        fn find_file(\u0026self, _id: \u0026FileId) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n            Ok(None)\n        }\n\n        fn find_file_by_content_hash(\n            \u0026self,\n            _content_hash: \u0026ContentHash,\n        ) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n            if let Some(error) = \u0026self.failure {\n                return Err(clone_repository_error(error));\n            }\n\n            Ok(self.existing_by_hash.clone())\n        }\n\n        fn stats_since(\n            \u0026self,\n            _recent_since: UnixTimestamp,\n        ) -\u003e Result\u003cRepositoryStats, RepositoryError\u003e {\n            Ok(RepositoryStats {\n                file_count: 0,\n                tag_count: 0,\n                pinned_count: 0,\n                recent_upload_count: 0,\n            })\n        }\n    }\n\n    fn clone_repository_error(error: \u0026RepositoryError) -\u003e RepositoryError {\n        match error {\n            RepositoryError::Busy =\u003e RepositoryError::Busy,\n            RepositoryError::Conflict { message } =\u003e RepositoryError::Conflict {\n                message: message.clone(),\n            },\n            RepositoryError::NotFound =\u003e RepositoryError::NotFound,\n            RepositoryError::OperationFailed { message } =\u003e RepositoryError::OperationFailed {\n                message: message.clone(),\n            },\n        }\n    }\n\n    fn valid_hash() -\u003e ContentHash {\n        match ContentHash::new(\"abcdefabcdef0123456789abcdef0123456789abcdef0123456789abcdef0123\") {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test hash: {error}\"),\n        }\n    }\n\n    fn file_id(value: \u0026str) -\u003e FileId {\n        match FileId::new(value) {\n            Ok(id) =\u003e id,\n            Err(error) =\u003e panic!(\"invalid test file id: {error}\"),\n        }\n    }\n\n    fn handle() -\u003e StorageHandle {\n        match StorageHandle::new(\"blobs/ab/cd/hash\") {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test storage handle: {error}\"),\n        }\n    }\n\n    fn filename(value: \u0026str) -\u003e FileName {\n        match FileName::new(value) {\n            Ok(name) =\u003e name,\n            Err(error) =\u003e panic!(\"invalid test filename: {error}\"),\n        }\n    }\n\n    fn mime_type(value: \u0026str) -\u003e MimeType {\n        match MimeType::new(value) {\n            Ok(mime_type) =\u003e mime_type,\n            Err(error) =\u003e panic!(\"invalid test MIME type: {error}\"),\n        }\n    }\n\n    fn blob_store(deduplicated: bool) -\u003e FakeBlobStore {\n        FakeBlobStore {\n            outcome: BlobWriteOutcome {\n                content_hash: valid_hash(),\n                handle: handle(),\n                size: FileSize::new(11),\n                deduplicated,\n            },\n            cleanup_calls: RefCell::new(Vec::new()),\n        }\n    }\n\n    #[test]\n    fn upload_streams_blob_and_inserts_metadata() {\n        let store = blob_store(false);\n        let service = UploadService::new(\n            store,\n            FakeRepository::ok(),\n            QueueIds::new(vec![file_id(\"file-1\")]),\n            FixedClock,\n        );\n        let mut source = Cursor::new(b\"hello world\".as_slice());\n        let mut request = UploadRequest {\n            filename: \"photo.jpg\",\n            mime_type: Some(\"IMAGE/JPEG\"),\n            tags: \u0026[\"Family\", \" family \"],\n            pinned_at: Some(1),\n            source: \u0026mut source,\n        };\n\n        let result = service.upload(\u0026mut request);\n\n        assert!(matches!(\n            result,\n            Ok(value) if value.record.id.as_str() == \"file-1\"\n                \u0026\u0026 value.record.name == filename(\"photo.jpg\")\n                \u0026\u0026 value.record.mime_type == mime_type(\"image/jpeg\")\n                \u0026\u0026 value.record.tags.len() == 1\n                \u0026\u0026 value.record.is_pinned()\n                \u0026\u0026 !value.deduplicated\n        ));\n    }\n\n    #[test]\n    fn deduplicated_upload_returns_existing_record_without_insert() {\n        let existing = existing_record();\n        let service = UploadService::new(\n            blob_store(true),\n            FakeRepository::with_existing(existing),\n            QueueIds::new(Vec::new()),\n            FixedClock,\n        );\n        let mut source = Cursor::new(b\"hello world\".as_slice());\n        let mut request = UploadRequest {\n            filename: \"duplicate.jpg\",\n            mime_type: Some(\"image/jpeg\"),\n            tags: \u0026[\"ignored\"],\n            pinned_at: Some(1),\n            source: \u0026mut source,\n        };\n\n        let result = service.upload(\u0026mut request);\n\n        assert!(matches!(\n            result,\n            Ok(value) if value.record.id.as_str() == \"file-existing\" \u0026\u0026 value.deduplicated\n        ));\n        assert_eq!(*service.repository.insert_calls.borrow(), 0);\n    }\n\n    #[test]\n    fn upload_cleans_blob_when_metadata_commit_fails() {\n        let store = blob_store(false);\n        let expected_handle = store.outcome.handle.clone();\n        let service = UploadService::new(\n            store,\n            FakeRepository::failing(RepositoryError::Busy),\n            QueueIds::new(vec![file_id(\"file-1\")]),\n            FixedClock,\n        );\n        let mut source = Cursor::new(b\"hello world\".as_slice());\n        let mut request = UploadRequest {\n            filename: \"photo.jpg\",\n            mime_type: None,\n            tags: \u0026[],\n            pinned_at: None,\n            source: \u0026mut source,\n        };\n\n        let result = service.upload(\u0026mut request);\n\n        assert!(matches!(\n            result,\n            Err(UploadError::CommitFailed {\n                repository: RepositoryError::Busy,\n                cleanup: None,\n            })\n        ));\n        assert_eq!(\n            service.blob_store.cleanup_calls.borrow().as_slice(),\n            \u0026[expected_handle]\n        );\n    }\n\n    fn existing_record() -\u003e FileRecord {\n        FileRecord {\n            id: file_id(\"file-existing\"),\n            name: filename(\"original.jpg\"),\n            size: FileSize::new(11),\n            content_hash: valid_hash(),\n            mime_type: mime_type(\"image/jpeg\"),\n            storage_handle: handle(),\n            uploaded_at: FixedClock.now(),\n            tags: Vec::new(),\n            pinned_at: None,\n        }\n    }
