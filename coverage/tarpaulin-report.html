color_enabled: bool,\n    /// Whether progress output should be drawn as an interactive bar.\n    pub progress_bar_enabled: bool,\n}\n\n/// User-requested data output.\n#[derive(Debug, Copy, Clone, PartialEq, Eq)]\npub enum RequestedOutput {\n    /// Human or pipeline output should be selected from terminal state.\n    Default,\n    /// Stable JSON was requested explicitly.\n    Json,\n}\n\n/// Whether a stream is connected to an interactive terminal.\n#[derive(Debug, Copy, Clone, PartialEq, Eq)]\npub enum StreamKind {\n    /// Interactive terminal.\n    Tty,\n    /// Pipe, file, or other non-interactive sink.\n    Piped,\n}\n\n/// Color-related environment state.\n#[derive(Debug, Copy, Clone, PartialEq, Eq)]\npub enum ColorEnvironment {\n    /// No environment variable disables color.\n    AllowsColor,\n    /// `NO_COLOR` is present.\n    NoColor,\n}\n\n/// Terminal and flag facts used to choose output behavior.\n#[derive(Debug, Copy, Clone, PartialEq, Eq)]\npub struct OutputFacts {\n    /// Data output requested by the user.\n    pub requested_output: RequestedOutput,\n    /// State of stdout.\n    pub stdout: StreamKind,\n    /// State of stderr.\n    pub stderr: StreamKind,\n    /// Color-related environment state.\n    pub color_environment: ColorEnvironment,\n}\n\nimpl OutputPolicy {\n    /// Builds the output policy from global flags and terminal facts.\n    #[must_use]\n    pub const fn decide(color_choice: ColorChoice, facts: OutputFacts) -\u003e Self {\n        let format = match (facts.requested_output, facts.stdout) {\n            (RequestedOutput::Json, _) =\u003e OutputFormat::Json,\n            (RequestedOutput::Default, StreamKind::Tty) =\u003e OutputFormat::Pretty,\n            (RequestedOutput::Default, StreamKind::Piped) =\u003e OutputFormat::Tsv,\n        };\n\n        let color_enabled = match color_choice {\n            ColorChoice::Never =\u003e false,\n            ColorChoice::Always =\u003e matches!(facts.color_environment, ColorEnvironment::AllowsColor),\n            ColorChoice::Auto =\u003e {\n                matches!(facts.stdout, StreamKind::Tty)\n                    \u0026\u0026 matches!(facts.color_environment, ColorEnvironment::AllowsColor)\n            }\n        };\n\n        Self {\n            format,\n            color_enabled,\n            progress_bar_enabled: matches!(facts.stdout, StreamKind::Tty)\n                \u0026\u0026 matches!(facts.stderr, StreamKind::Tty),\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{\n        ColorChoice, ColorEnvironment, OutputFacts, OutputFormat, OutputPolicy, RequestedOutput,\n        StreamKind,\n    };\n\n    #[test]\n    fn json_flag_wins_over_tty_detection() {\n        let policy = OutputPolicy::decide(\n            ColorChoice::Auto,\n            OutputFacts {\n                requested_output: RequestedOutput::Json,\n                stdout: StreamKind::Tty,\n                stderr: StreamKind::Tty,\n                color_environment: ColorEnvironment::AllowsColor,\n            },\n        );\n\n        assert_eq!(policy.format, OutputFormat::Json);\n    }\n\n    #[test]\n    fn piped_stdout_uses_tsv_without_color() {\n        let policy = OutputPolicy::decide(\n            ColorChoice::Auto,\n            OutputFacts {\n                requested_output: RequestedOutput::Default,\n                stdout: StreamKind::Piped,\n                stderr: StreamKind::Tty,\n                color_environment: ColorEnvironment::AllowsColor,\n            },\n        );\n\n        assert_eq!(policy.format, OutputFormat::Tsv);\n        assert!(!policy.color_enabled);\n    }\n\n    #[test]\n    fn no_color_disables_forced_color() {\n        let policy = OutputPolicy::decide(\n            ColorChoice::Always,\n            OutputFacts {\n                requested_output: RequestedOutput::Default,\n                stdout: StreamKind::Tty,\n                stderr: StreamKind::Tty,\n                color_environment: ColorEnvironment::NoColor,\n            },\n        );\n\n        assert!(!policy.color_enabled);\n    }\n}\n","traces":[{"line":79,"address":[398800],"length":1,"stats":{"Line":3}},{"line":80,"address":[398859,398823],"length":1,"stats":{"Line":5}},{"line":81,"address":[398848],"length":1,"stats":{"Line":1}},{"line":82,"address":[398879],"length":1,"stats":{"Line":1}},{"line":83,"address":[398872],"length":1,"stats":{"Line":1}},{"line":86,"address":[398888],"length":1,"stats":{"Line":1}},{"line":87,"address":[398960],"length":1,"stats":{"Line":0}},{"line":88,"address":[398936],"length":1,"stats":{"Line":1}},{"line":90,"address":[398967,398919],"length":1,"stats":{"Line":3}},{"line":91,"address":[398974],"length":1,"stats":{"Line":1}},{"line":98,"address":[399012],"length":1,"stats":{"Line":1}}],"covered":10,"coverable":11},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tssp-domain","src","error.rs"],"content":"//! Error types produced by pure domain validation.\n\nuse thiserror::Error;\n\n/// A validation failure in a TSSP domain value.\n#[derive(Debug, Clone, PartialEq, Eq, Error)]\npub enum DomainError {\n    /// A required value was empty after normalization.\n    #[error(\"{field} must not be empty\")]\n    Empty {\n        /// Human-readable field name.\n        field: \u0026'static str,\n    },\n\n    /// A value exceeded a documented size limit.\n    #[error(\"{field} is too long: {actual} exceeds {max}\")]\n    TooLong {\n        /// Human-readable field name.\n        field: \u0026'static str,\n        /// Maximum accepted length.\n        max: usize,\n        /// Actual supplied length.\n        actual: usize,\n    },\n\n    /// A value used a byte or character that is not accepted by the rule.\n    #[error(\"{field} contains an invalid character: {character:?}\")]\n    InvalidCharacter {\n        /// Human-readable field name.\n        field: \u0026'static str,\n        /// Rejected character.\n        character: char,\n    },\n\n    /// A value did not match a required shape.\n    #[error(\"{field} has invalid format\")]\n    InvalidFormat {\n        /// Human-readable field name.\n        field: \u0026'static str,\n    },\n\n    /// A numeric value fell outside the accepted inclusive range.\n    #[error(\"{field} must be between {min} and {max}, got {actual}\")]\n    OutOfRange {\n        /// Human-readable field name.\n        field: \u0026'static str,\n        /// Inclusive lower bound.\n        min: u64,\n        /// Inclusive upper bound.\n        max: u64,\n        /// Supplied value.\n        actual: u64,\n    },\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tssp-domain","src","file.rs"],"content":"//! File metadata value objects and aggregate records.\n\nuse std::fmt;\n\nuse crate::{text, ContentHash, DomainError, Tag, UnixTimestamp};\n\nconst MAX_ID_LEN: usize = 128;\nconst MAX_FILENAME_BYTES: usize = 4096;\nconst MAX_STORAGE_COMPONENT_BYTES: usize = 120;\nconst MAX_MIME_LEN: usize = 127;\n\n/// Opaque file identifier exposed to clients.\n#[derive(Debug, Clone, PartialEq, Eq, Hash, PartialOrd, Ord)]\npub struct FileId(String);\n\nimpl FileId {\n    /// Creates a file id from a non-empty URL-safe token.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the id is empty, too long, or contains a\n    /// character outside the opaque URL-safe token set.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        let value = value.as_ref().trim();\n        validate_token(\"file id\", value, MAX_ID_LEN)?;\n        Ok(Self(value.to_owned()))\n    }\n\n    /// Returns the client-visible identifier.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl fmt::Display for FileId {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\n/// Original filename preserved for display and metadata.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct FileName {\n    original: String,\n    storage_component: String,\n}\n\nimpl FileName {\n    /// Creates a filename and derives a safe storage component from it.\n    ///\n    /// The original name is NFC-normalized and preserved. The storage component\n    /// is intentionally lossy and must never be shown as the user-facing name.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError::Empty`] when the filename is empty, or\n    /// [`DomainError::TooLong`] when it exceeds the metadata limit.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        let original = text::normalize_unicode(value.as_ref());\n        if original.is_empty() {\n            return Err(DomainError::Empty { field: \"filename\" });\n        }\n        if original.len() \u003e MAX_FILENAME_BYTES {\n            return Err(DomainError::TooLong {\n                field: \"filename\",\n                max: MAX_FILENAME_BYTES,\n                actual: original.len(),\n            });\n        }\n\n        let storage_component = sanitize_storage_component(\u0026original);\n        Ok(Self {\n            original,\n            storage_component,\n        })\n    }\n\n    /// Returns the user-facing filename.\n    #[must_use]\n    pub fn original(\u0026self) -\u003e \u0026str {\n        \u0026self.original\n    }\n\n    /// Returns a filesystem-safe component that contains no user-controlled path separators.\n    #[must_use]\n    pub fn storage_component(\u0026self) -\u003e \u0026str {\n        \u0026self.storage_component\n    }\n}\n\nimpl fmt::Display for FileName {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.original())\n    }\n}\n\n/// Byte length of a stored file.\n#[derive(Debug, Copy, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]\npub struct FileSize(u64);\n\nimpl FileSize {\n    /// Creates a file size. Empty files are valid and represented by zero.\n    #[must_use]\n    pub const fn new(bytes: u64) -\u003e Self {\n        Self(bytes)\n    }\n\n    /// Returns the size in bytes.\n    #[must_use]\n    pub const fn bytes(self) -\u003e u64 {\n        self.0\n    }\n}\n\n/// MIME type recorded for a file.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct MimeType(String);\n\nimpl MimeType {\n    /// Creates a MIME type after basic RFC-style shape validation.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the value is empty, too long, lacks a `/`,\n    /// or contains unsupported MIME token characters.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        let value = value.as_ref().trim().to_ascii_lowercase();\n        if value.is_empty() {\n            return Err(DomainError::Empty { field: \"mime type\" });\n        }\n        if value.len() \u003e MAX_MIME_LEN {\n            return Err(DomainError::TooLong {\n                field: \"mime type\",\n                max: MAX_MIME_LEN,\n                actual: value.len(),\n            });\n        }\n        validate_mime_characters(\u0026value)?;\n        Ok(Self(value))\n    }\n\n    /// Returns `application/octet-stream`.\n    #[must_use]\n    pub fn octet_stream() -\u003e Self {\n        Self(\"application/octet-stream\".to_owned())\n    }\n\n    /// Returns the normalized MIME type.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl fmt::Display for MimeType {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\n/// Opaque handle used by storage adapters to find blob bytes.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct StorageHandle(String);\n\nimpl StorageHandle {\n    /// Creates a storage handle from an opaque non-empty token.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the handle is empty, too long, or contains\n    /// a character outside the storage-handle token set.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        let value = value.as_ref().trim();\n        validate_token(\"storage handle\", value, 512)?;\n        Ok(Self(value.to_owned()))\n    }\n\n    /// Returns the opaque handle string.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl fmt::Display for StorageHandle {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\n/// Complete metadata record for one logical file.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct FileRecord {\n    /// Client-visible id.\n    pub id: FileId,\n    /// Original filename.\n    pub name: FileName,\n    /// Stored byte count.\n    pub size: FileSize,\n    /// Content-addressing hash.\n    pub content_hash: ContentHash,\n    /// MIME type for downloads and previews.\n    pub mime_type: MimeType,\n    /// Opaque storage location.\n    pub storage_handle: StorageHandle,\n    /// Upload time in UTC seconds.\n    pub uploaded_at: UnixTimestamp,\n    /// Tags attached to the file.\n    pub tags: Vec\u003cTag\u003e,\n    /// Pin order when the file is pinned.\n    pub pinned_at: Option\u003cu32\u003e,\n}\n\nimpl FileRecord {\n    /// Returns true when the file is currently pinned.\n    #[must_use]\n    pub const fn is_pinned(\u0026self) -\u003e bool {\n        self.pinned_at.is_some()\n    }\n}\n\nfn validate_token(field: \u0026'static str, value: \u0026str, max_len: usize) -\u003e Result\u003c(), DomainError\u003e {\n    if value.is_empty() {\n        return Err(DomainError::Empty { field });\n    }\n    if value.len() \u003e max_len {\n        return Err(DomainError::TooLong {\n            field,\n            max: max_len,\n            actual: value.len(),\n        });\n    }\n    if let Some(character) = value\n        .chars()\n        .find(|character| !is_token_character(*character))\n    {\n        return Err(DomainError::InvalidCharacter { field, character });\n    }\n    Ok(())\n}\n\nfn is_token_character(character: char) -\u003e bool {\n    character.is_ascii_alphanumeric() || matches!(character, '-' | '_' | '.' | ':' | '/')\n}\n\nfn sanitize_storage_component(original: \u0026str) -\u003e String {\n    let mut sanitized = String::new();\n    let mut last_was_separator = false;\n\n    for character in original.chars() {\n        if is_storage_safe_character(character) {\n            sanitized.push(character);\n            last_was_separator = false;\n        } else if !last_was_separator {\n            sanitized.push('_');\n            last_was_separator = true;\n        }\n    }\n\n    while sanitized.contains(\"_.\") {\n        sanitized = sanitized.replace(\"_.\", \".\");\n    }\n\n    let trimmed = sanitized.trim_matches(['.', '_', ' ']).to_owned();\n    let safe_name = if trimmed.is_empty() || trimmed == \".\" || trimmed == \"..\" {\n        \"file\".to_owned()\n    } else {\n        trimmed\n    };\n\n    text::truncate_to_bytes(\u0026safe_name, MAX_STORAGE_COMPONENT_BYTES)\n}\n\nfn is_storage_safe_character(character: char) -\u003e bool {\n    character.is_ascii_alphanumeric() || matches!(character, '.' | '-' | '_')\n}\n\nfn validate_mime_characters(value: \u0026str) -\u003e Result\u003c(), DomainError\u003e {\n    if !value.contains('/') {\n        return Err(DomainError::InvalidFormat { field: \"mime type\" });\n    }\n\n    if let Some(character) = value.chars().find(|character| {\n        !(character.is_ascii_alphanumeric() || matches!(character, '/' | '+' | '-' | '.'))\n    }) {\n        return Err(DomainError::InvalidCharacter {\n            field: \"mime type\",\n            character,\n        });\n    }\n\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{FileId, FileName, FileSize, MimeType, StorageHandle};\n    use crate::DomainError;\n\n    #[test]\n    fn file_id_accepts_url_safe_tokens() {\n        assert!(FileId::new(\"018f-abc_DEF.1\").is_ok());\n    }\n\n    #[test]\n    fn file_id_rejects_spaces() {\n        assert_eq!(\n            FileId::new(\"bad id\"),\n            Err(DomainError::InvalidCharacter {\n                field: \"file id\",\n                character: ' '\n            })\n        );\n    }\n\n    #[test]\n    fn filename_preserves_original_and_sanitizes_storage_component() {\n        let name = FileName::new(\"report / Q2\\u{0}.pdf\");\n\n        assert!(matches!(\n            name,\n            Ok(value) if value.original() == \"report / Q2\\u{0}.pdf\"\n                \u0026\u0026 value.storage_component() == \"report_Q2.pdf\"\n        ));\n    }\n\n    #[test]\n    fn filename_rejects_empty_names() {\n        assert_eq!(\n            FileName::new(\"\"),\n            Err(DomainError::Empty { field: \"filename\" })\n        );\n    }\n\n    #[test]\n    fn filename_sanitizer_never_returns_dot_components() {\n        assert!(matches!(FileName::new(\"../\"), Ok(value) if value.storage_component() == \"file\"));\n    }\n\n    #[test]\n    fn long_filename_is_rejected_before_storage_sanitization() {\n        let filename = \"a\".repeat(4097);\n\n        assert_eq!(\n            FileName::new(filename),\n            Err(DomainError::TooLong {\n                field: \"filename\",\n                max: 4096,\n                actual: 4097\n            })\n        );\n    }\n\n    #[test]\n    fn zero_byte_file_size_is_valid() {\n        assert_eq!(FileSize::new(0).bytes(), 0);\n    }\n\n    #[test]\n    fn mime_type_is_lowercase() {\n        assert!(matches!(\n            MimeType::new(\"IMAGE/PNG\"),\n            Ok(value) if value.as_str() == \"image/png\"\n        ));\n    }\n\n    #[test]\n    fn mime_type_requires_sla alue.to_ascii_lowercase()))\n    }\n\n    /// Returns the lowercase hexadecimal representation.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl fmt::Display for ContentHash {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::ContentHash;\n    use crate::DomainError;\n\n    #[test]\n    fn valid_hash_is_lowercase() {\n        let hash =\n            ContentHash::new(\"ABCDEFabcdef0123456789abcdef0123456789abcdef0123456789abcdef0123\");\n\n        assert!(matches!(hash, Ok(value) if value.as_str().starts_with(\"abcdef\")));\n    }\n\n    #[test]\n    fn wrong_length_is_rejected() {\n        let hash = ContentHash::new(\"abc\");\n\n        assert_eq!(\n            hash,\n            Err(DomainError::InvalidFormat {\n                field: \"content hash\"\n            })\n        );\n    }\n\n    #[test]\n    fn non_hex_character_is_rejected() {\n        let hash =\n            ContentHash::new(\"zbcdefabcdef0123456789abcdef0123456789abcdef0123456789abcdef0123\");\n\n        assert_eq!(\n            hash,\n            Err(DomainError::InvalidCharacter {\n                field: \"content hash\",\n                character: 'z'\n            })\n        );\n    }\n}\n","traces":[{"line":23,"address":[1230337,1230288],"length":1,"stats":{"Line":12}},{"line":24,"address":[1230382,1230320],"length":1,"stats":{"Line":24}},{"line":25,"address":[1230441],"length":1,"stats":{"Line":12}},{"line":26,"address":[1699264,1698660],"length":1,"stats":{"Line":1}},{"line":27,"address":[],"length":0,"stats":{"Line":0}},{"line":31,"address":[6974048,6974005],"length":1,"stats":{"Line":25}},{"line":33,"address":[1699680,1699705,1699632,1699353,1698743,1699657],"length":1,"stats":{"Line":33}},{"line":35,"address":[1698814,1699424],"length":1,"stats":{"Line":1}},{"line":36,"address":[],"len lt\u003cSelf, DomainError\u003e {\n        if value == 0 || value \u003e MAX_PAGE_SIZE {\n            return Err(DomainError::OutOfRange {\n                field: \"page size\",\n                min: 1,\n                max: u64::from(MAX_PAGE_SIZE),\n                actual: u64::from(value),\n            });\n        }\n\n        Ok(Self(value))\n    }\n\n    /// Returns the specification default page size.\n    #[must_use]\n    pub const fn default() -\u003e Self {\n        Self(DEFAULT_PAGE_SIZE)\n    }\n\n    /// Returns the numeric page size.\n    #[must_use]\n    pub const fn get(self) -\u003e u16 {\n        self.0\n    }\n}\n\n/// Opaque pagination cursor.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct Cursor(String);\n\nimpl Cursor {\n    /// Creates a cursor from an opaque non-empty URL-safe string.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the cursor is empty, too long, or contains\n    /// characters outside the cursor token set.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        let value = value.as_ref().trim();\n        if value.is_empty() {\n            return Err(DomainError::Empty { field: \"cursor\" });\n        }\n        if value.len() \u003e MAX_CURSOR_LEN {\n            return Err(DomainError::TooLong {\n                field: \"cursor\",\n                max: MAX_CURSOR_LEN,\n                actual: value.len(),\n            });\n        }\n        if let Some(character) = value\n            .chars()\n            .find(|character| !is_cursor_character(*character))\n        {\n            return Err(DomainError::InvalidCharacter {\n                field: \"cursor\",\n                character,\n            });\n        }\n\n        Ok(Self(value.to_owned()))\n    }\n\n    /// Returns the cursor string.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nfn is_cursor_character(character: char) -\u003 SE64URL_LEN {\n            return Err(DomainError::InvalidFormat {\n                field: \"session token\",\n            });\n        }\n\n        if let Some(character) = value\n            .chars()\n            .find(|character| !is_base64url_character(*character))\n        {\n            return Err(DomainError::InvalidCharacter {\n                field: \"session token\",\n                character,\n            });\n        }\n\n        Ok(Self(value.to_owned()))\n    }\n\n    /// Returns the token text. Tokens must be redacted from logs.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n\n    /// Returns the required entropy in bits.\n    #[must_use]\n    pub const fn entropy_bits() -\u003e usize {\n        TOKEN_BITS\n    }\n}\n\nimpl fmt::Display for SessionToken {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\n/// State for a single-use QR transfer session.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct TransferSession {\n    /// Unguessable session token.\n    pub token: SessionToken,\n    /// Session type.\n    pub kind: SessionKind,\n    /// UTC creation time.\n    pub created_at: UnixTimestamp,\n    /// UTC expiration time.\n    pub expires_at: UnixTimestamp,\n    /// Source file for send sessions.\n    pub source_file: Option\u003cFileId\u003e,\n    /// Completed uploaded file for receive sessions.\n    pub received_file: Option\u003cFileId\u003e,\n    /// Original expected upload name, when supplied by a receive session.\n    pub expected_name: Option\u003cFileName\u003e,\n    used_at: Option\u003cUnixTimestamp\u003e,\n}\n\nimpl TransferSession {\n    /// Creates a new unused transfer session.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when expiration is not after creation or a send\n    /// session lacks its required source file.\n    pub fn new(\n        token: SessionToken,\n        kind: SessionKind,\n        created_at: UnixTimestamp,\n        expires_at: UnixTimestamp,\n        source_file: Option\u003cFileId\u003e,\n    ) -\u003e Result\u003cSelf, DomainError\u003e {\n        if expires_at \u003c= created_at {\n            return Err(DomainError::OutOfRange {\n                field: \"session expiration\",\n                min: created_at.seconds_u64().saturating_add(1),\n                max: UnixTimestamp::MAX_SECONDS,\n                actual: expires_at.seconds_u64(),\n            });\n        }\n\n        if kind == SessionKind::Send \u0026\u0026 source_file.is_none() {\n            return Err(DomainError::InvalidFormat {\n                field: \"send session source file\",\n            });\n        }\n\n        Ok(Self {\n            token,\n            kind,\n            created_at,\n            expires_at,\n            source_file,\n            received_file: None,\n            expected_name: None,\n            used_at: None,\n        })\n    }\n\n    /// Returns true when the session is already consumed.\n    #[must_use]\n    pub const fn is_used(\u0026self) -\u003e bool {\n        self.used_at.is_some()\n    }\n\n    /// Returns true when the session is expired at `now`.\n    #[must_use]\n    pub const fn is_expired_at(\u0026self, now: UnixTimestamp) -\u003e bool {\n        now.seconds() \u003e= self.expires_at.seconds()\n    }\n\n    /// Marks the session as used exactly once.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the session was already used or the supplied\n    /// use time is outside the valid session window.\n    pub fn mark_used(\u0026mut self, used_at: UnixTimestamp) -\u003e Result\u003c(), DomainError\u003e {\n        if self.used_at.is_some() {\n            return Err(DomainError::InvalidFormat {\n                field: \"session state\",\n            });\n        }\n        if self.is_expired_at(used_at) {\n            return Err(DomainError::OutOfRange {\n                field: \"session use time\",\n                min: self.created_at.seconds_u64(),\n                max: self.expires_at.seconds_u64().saturating_sub(1),\n                actual: used_at.seconds_u64(),\n            });\n        }\n\n        self.used_at = Some(used_at);\n        Ok(())\n    }\n}\n\nfn is_base64url_character(character: char) -\u003e bool {\n    character.is_ascii_alphanumeric() || matches!(character, '-' | '_')\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{SessionKind, SessionToken, TransferSession};\n    use crate::{DomainError, FileId, UnixTimestamp};\n\n    fn timestamp(seconds: i64) -\u003e UnixTimestamp {\n        match UnixTimestamp::new(seconds) {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test timestamp: {error}\"),\n        }\n    }\n\n    fn token() -\u003e SessionToken {\n        match SessionToken::new(\"abcdefghijklmnopqrstu1\") {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test token: {error}\"),\n        }\n    }\n\n    fn file_id() -\u003e FileId {\n        match FileId::new(\"018f-test\") {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test file id: {error}\"),\n        }\n    }\n\n    #[test]\n    fn token_requires_base64url_shape_for_128_bits() {\n        assert_eq!(SessionToken::entropy_bits(), 128);\n        assert!(SessionToken::new(\"abcdefghijklmnopqrstu1\").is_ok());\n        assert_eq!(\n            SessionToken::new(\"short\"),\n            Err(DomainError::InvalidFormat {\n                field: \"session token\"\n            })\n        );\n    }\n\n    #[test]\n    fn token_rejects_padding() {\n        assert_eq!(\n            SessionToken::new(\"abcdefghijklmnopqrstu=\"),\n            Err(DomainError::InvalidCharacter {\n                field: \"session token\",\n                character: '='\n            })\n        );\n    }\n\n    #[test]\n    fn send_session_requires_source_file() {\n        assert_eq!(\n            TransferSession::new(\n                token(),\n                SessionKind::Send,\n                timestamp(10),\n                timestamp(20),\n                None\n            ),\n            Err(DomainError::InvalidFormat {\n                field: \"send session source file\"\n            })\n        );\n    }\n\n    #[test]\n    fn session_can_be_used_once_before_expiration() {\n        let mut session = match TransferSession::new(\n            token(),\n            SessionKind::Send,\n            timestamp(10),\n            timestamp(20),\n            Some(file_id()),\n        ) {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test session: {error}\"),\n        };\n\n        assert!(session.mark_used(timestamp(19)).is_ok());\n        assert!(session.is_used());\n        assert_eq!(\n            session.mark_used(timestamp(19)),\n            Err(DomainError::InvalidFormat {\n                field: \"session state\"\n            })\n        );\n    }\n\n    #[test]\n    fn session_cannot_be_used_at_expiration_boundary() {\n        let mut session = match TransferSession::new(\n            token(),\n            SessionKind::Receive,\n            timestamp(10),\n            timestamp(20),\n            None,\n        ) {\n            Ok(value) =\u003e value,\n            Err(error) =\u003e panic!(\"invalid test session: {error}\"),\n        };\n\n        assert_eq!(\n            session.mark_used(timestamp(20)),\n            Err(DomainError::OutOfRange {\n                field: \"session use time\",\n                min: 10,\n                max: 19,\n                actual: 20\n            })\n        );\n    }\n}\n","traces":[{"line":31,"address":[4923728,4924320],"length":1,"stats":{"Line":2}},{"line":32,"address":[],"length":0,"stats":{"Line":5}},{"line":33,"address":[637465],"length":1,"stats":{"Line":4}},{"line":34,"address":[860756],"length":1,"stats":{"Line":1}},{"line":35,"addre lowed_tag_character(*character))\n        {\n            return Err(DomainError::InvalidCharacter {\n                field: \"tag\",\n                character,\n            });\n        }\n\n        let key = TagKey(display.to_lowercase());\n        Ok(Self { display, key })\n    }\n\n    /// Returns the normalized display form.\n    #[must_use]\n    pub fn display(\u0026self) -\u003e \u0026str {\n        \u0026self.display\n    }\n\n    /// Returns the case-insensitive lookup key.\n    #[must_use]\n    pub const fn key(\u0026self) -\u003e \u0026TagKey {\n        \u0026self.key\n    }\n}\n\nimpl fmt::Display for Tag {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.display())\n    }\n}\n\n/// Case-insensitive tag lookup key.\n#[derive(Debug, Clone, PartialEq, Eq, Hash, PartialOrd, Ord)]\npub struct TagKey(String);\n\nimpl TagKey {\n    /// Creates a lookup key using the same normalization rules as [`Tag`].\n    ///\n    /// # Errors\n    ///\n    /// Returns [`DomainError`] when the supplied text is not a valid tag.\n    pub fn new(value: impl AsRef\u003cstr\u003e) -\u003e Result\u003cSelf, DomainError\u003e {\n        Tag::new(value).map(|tag| tag.key)\n    }\n\n    /// Returns the normalized key.\n    #[must_use]\n    pub fn as_str(\u0026self) -\u003e \u0026str {\n        \u0026self.0\n    }\n}\n\nimpl fmt::Display for TagKey {\n    fn fmt(\u0026self, formatter: \u0026mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        formatter.write_str(self.as_str())\n    }\n}\n\nfn is_allowed_tag_character(character: char) -\u003e bool {\n    !character.is_control() \u0026\u0026 !matches!(character, '/' | '\\\\' | ',' | '\\u{7f}')\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{Tag, TagKey};\n    use crate::DomainError;\n\n    #[test]\n    fn tag_normalizes_whitespace_and_lookup_case() {\n        let tag = Tag::new(\"  Family\\t Photos  \");\n\n        assert!(matches!(\n            tag,\n            Ok(value) if value.display() == \"Family Photos\" \u0026\u0026 value.key().as_str() == \"family photos\"\n        ));\n    }\n\n    #[test]\n    fn tag_lookup_key_uses_same_rules() {\n        let key = TagKey::new(\"FAMILY PHOTOS\");\n\n        assert!(matches!(key, Ok(value) if value.as_str() == \"family photos\"));\n    }\n\n    #[test]\n    fn empty_tag_is_rejected() {\n        assert_eq!(Tag::new(\" \\n \"), Err(DomainError::Empty { field: \"tag\" }));\n    }\n\n    #[test]\n    fn control_character_is_rejected() {\n        assert_eq!(\n            Tag::new(\"bad\\u{0}tag\"),\n            Err(DomainError::InvalidCharacter {\n                field: \"tag\",\n                character: '\\u{0}'\n            })\n        );\n    }\n\n    #[test]\n    fn tag_has_length_limit() {\n        let tag = \"a\".repeat(65);\n\n        assert_eq!(\n            Tag::new(tag),\n            Err(DomainError::TooLong {\n                field: \"tag\",\n                max: 64,\n                actual: 65\n            })\n        );\n    }\n}\n","traces":[{"line":27,"address":[5087993,5086928],"length":1,"stats":{"Line":9}},{"line":28,"address":[1718910,1717865,1717939,1718990],"length":1,"stats":{"Line":19}},{"line":29,"address":[4538434,4538490],"length":1,"stats":{"Line":21}},{"line":30,"address":[5087157],"length":1,"stats":{"Line":1}},{"line":33,"address":[9484012,9483903],"length":1,"stats":{"Line":21}},{"line":34,"address":[9238731],"length":1,"stats":{"Line":10}},{"line":35,"address":[4538706],"length":1,"stats":{"Line":1}},{"line":36,"address":[],"length":0,"stats":{"Line":0}},{"line":37,"address":[],"length":0,"stats":{"Line":0}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":42,"address":[4538879,4538679,4538840],"length":1,"stats":{"Line":33}},{"line":44,"address":[],"length":0,"stats":{"Line":37}},{"line":46,"address":[9484338],"length":1,"stats":{"Line":1}},{"line":47,"address":[],"length":0,"stats":{"Line":0}},{"line":48,"address": n    output\n}\n\n/// Truncates a string at a UTF-8 character boundary.\npub(crate) fn truncate_to_bytes(value: \u0026str, max_bytes: usize) -\u003e String {\n    if value.len() \u003c= max_bytes {\n        return value.to_owned();\n    }\n\n    let mut output = String::new();\n    for character in value.chars() {\n        let next_len = output.len() + character.len_utf8();\n        if next_len \u003e max_bytes {\n            break;\n        }\n        output.push(character);\n    }\n    output\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{normalize_unicode, trim_and_collapse_whitespace, truncate_to_bytes};\n\n    #[test]\n    fn collapse_whitespace_trims_edges_and_preserves_words() {\n        assert_eq!(\n            trim_and_collapse_whitespace(\" \\t alpha\\n\\nbeta  \"),\n            \"alpha beta\"\n        );\n    }\n\n    #[test]\n    fn normalization_uses_composed_unicode() {\n        assert_eq!(normalize_unicode(\"e\\u{301}\"), \"é\");\n    }\n\n    #[test]\n    fn truncation_keeps_valid_utf8() {\n        assert_eq!(truncate_to_bytes(\"éclair\", 2), \"é\");\n    }\n}\n","traces":[{"line":6,"address":[697328],"length":1,"stats":{"Line":7}},{"line":7,"address":[2992688],"length":1,"stats":{"Line":9}},{"line":11,"address":[2993264,2993833,2993839],"length":1,"stats":{"Line":7}},{"line":12,"address":[697984],"length":1,"stats":{"Line":6}},{"line":13,"address":[11836351],"length":1,"stats":{"Line":9}},{"line":15,"address":[1026383,1026315,1026247],"length":1,"stats":{"Line":30}},{"line":16,"address":[943666,943747],"length":1,"stats":{"Line":19}},{"line":17,"address":[698422,698485],"length":1,"stats":{"Line":8}},{"line":21,"address":[1475577,1475646],"length":1,"stats":{"Line":14}},{"line":22,"address":[2932383],"length":1,"stats":{"Line":4}},{"line":23,"address":[8203846],"length":1,"stats":{"Line":4}},{"line":25,"address":[8203856,8203822],"length":1,"stats":{"Line":20}},{"line":28,"address":[943706],"length":1,"stats":{"Line":6}},{"line":32,"address":[2993      });\n        }\n\n        Ok(Self(seconds))\n    }\n\n    /// Returns seconds since the Unix epoch.\n    #[must_use]\n    pub const fn seconds(self) -\u003e i64 {\n        self.0\n    }\n\n    /// Returns the maximum supported timestamp.\n    #[must_use]\n    pub const fn max() -\u003e Self {\n        Self(MAX_REASONABLE_UNIX_SECONDS)\n    }\n\n    /// Returns seconds as an unsigned value.\n    #[must_use]\n    pub fn seconds_u64(self) -\u003e u64 {\n        seconds_to_u64_lossy(self.0)\n    }\n}\n\nfn seconds_to_u64_lossy(seconds: i64) -\u003e u64 {\n    u64::try_from(seconds).unwrap_or(0)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::UnixTimestamp;\n    use crate::DomainError;\n\n    #[test]\n    fn current_epoch_seconds_are_valid() {\n        assert!(UnixTimestamp::new(1_700_000_000).is_ok());\n    }\n\n    #[test]\n    fn negative_time_is_rejected() {\n        assert_eq!(\n            UnixTimestamp::new(-1),\n            Err(DomainError::OutOfRange {\n                field: \"unix timestamp\",\n                min: 0,\n                max: 4_102_444_800,\n                actual: 0\n            })\n        );\n    }\n\n    #[test]\n    fn millisecond_input_is_rejected_by_upper_bound() {\n        assert_eq!(\n            UnixTimestamp::new(1_700_000_000_000),\n            Err(DomainError::OutOfRange {\n                field: \"unix timestamp\",\n                min: 0,\n                max: 4_102_444_800,\n                actual: 1_700_000_000_000\n            })\n        );\n    }\n}\n","traces":[{"line":25,"address":[916880],"length":1,"stats":{"Line":8}},{"line":26,"address":[8177362],"length":1,"stats":{"Line":8}},{"line":27,"address":[2967382],"length":1,"stats":{"Line":1}},{"line":31,"address":[2967368],"length":1,"stats":{"Line":1}},{"line":35,"address":[2906048],"length":1,"stats":{"Line":8}},{"line":40,"address":[8177504],"length":1,"stats":{"Line":5}},{"line":52,"address":[1000176],"length":1,"stats":{"Line":2}},{"line":53,"address":[1449141],"length":1,"stats":{"Line":2}},{"line":57,"address":[1000384],"length":1,"stats":{"Line":2}},{"line":58,"address":[917061],"length":1,"stats":{"Line":2}}],"covered":10,"coverable":10},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tssp-ports","src","lib.rs"],"content":"//! Boundary traits between application services and infrastructure.\n//!\n//! Implementations live in adapter crates. Keeping these traits small and typed\n//! lets tests replace `SQLite`, filesystem storage, clocks, and ID generation with\n//! deterministic in-memory doubles.\n\nuse std::io::Read;\nuse std::sync::Arc;\n\nuse thiserror::Error;\nuse tssp_domain::{\n    ContentHash, FileId, FileName, FileRecord, FileSize, MimeType, SessionToken, StorageHandle,\n    Tag, UnixTimestamp,\n};\n\n/// Supplies server-side UTC timestamps.\npub trait Clock {\n    /// Returns the current UTC timestamp.\n    fn now(\u0026self) -\u003e UnixTimestamp;\n}\n\n/// Generates opaque identifiers used by the system.\npub trait IdGenerator {\n    /// Returns a new file identifier.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`IdGenerationError`] when the generator cannot produce a valid\n    /// unique identifier.\n    fn new_file_id(\u0026self) -\u003e Result\u003cFileId, IdGenerationError\u003e;\n}\n\n/// Generates unguessable one-time transfer tokens.\npub trait SessionTokenGenerator {\n    /// Returns a new 128-bit URL-safe session token.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`IdGenerationError`] when secure randomness is unavailable or\n    /// generated bytes cannot be encoded into a valid token.\n    fn new_session_token(\u0026self) -\u003e Result\u003cSessionToken, IdGenerationError\u003e;\n}\n\n/// Stores and retrieves content-addressed blob bytes.\npub trait BlobStore {\n    /// Streams bytes into storage and returns the durable content-addressed blob.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`BlobStoreError`] when the source cannot be read or the storage\n    /// backend cannot durably write the blob.\n    fn put_stream(\u0026self, source: \u0026mut dyn Read) -\u003e Result\u003cBlobWriteOutcome, BlobStoreError\u003e;\n\n    /// Removes a blob that is not referenced by committed metadata.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`BlobStoreError`] when cleanup cannot be completed. Callers\n    /// should log this because it may require later orphan reclamation.\n    fn cleanup_unreferenced(\u0026self, handle: \u0026StorageHandle) -\u003e Result\u003c(), BlobStoreError\u003e;\n}\n\n/// Persists and queries file metadata.\npub trait FileRepository {\n    /// Inserts a logical file record for an already durable blob.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`RepositoryError`] when metadata cannot be committed.\n    fn insert_file(\u0026self, new_file: NewFileRecord) -\u003e Result\u003cFileRecord, RepositoryError\u003e;\n\n    /// Returns one file record by id.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`RepositoryError`] when metadata lookup fails.\n    fn find_file(\u0026self, id: \u0026FileId) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e;\n\n    /// Returns the oldest file record for a content hash.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`RepositoryError`] when metadata lookup fails.\n    fn find_file_by_content_hash(\n        \u0026self,\n        content_hash: \u0026ContentHash,\n    ) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e;\n\n    /// Returns aggregate metadata counts for status reporting.\n    ///\n    /// # Errors\n    ///\n    /// Returns [`RepositoryError`] when aggregate queries fail.\n    fn stats_since(\u0026self, recent_since: UnixTimestamp) -\u003e Result\u003cRepositoryStats, RepositoryError\u003e;\n}\n\nimpl\u003cT\u003e BlobStore for Arc\u003cT\u003e\nwhere\n    T: BlobStore,\n{\n    fn put_stream(\u0026self, source: \u0026mut dyn Read) -\u003e Result\u003cBlobWriteOutcome, BlobStoreError\u003e {\n        self.as_ref().put_stream(source)\n    }\n\n    fn cleanup_unreferenced(\u0026self, handle: \u0026StorageHandle) -\u003e Result\u003c(), BlobStoreError\u003e {\n        self.as_ref().cleanup_unreferenced(handle)\n    }\n}\n\nimpl\u003cT\u003e FileRepository for Arc\u003cT\u003e\nwhere\n    T: FileRepository,\n{\n    fn insert_file(\u0026self, new_file: NewFileRecord) -\u003e Result\u003cFileRecord, RepositoryError\u003e {\n        self.as_ref().insert_file(new_file)\n    }\n\n    fn find_file(\u0026self, id: \u0026FileId) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n        self.as_ref().find_file(id)\n    }\n\n    fn find_file_by_content_hash(\n        \u0026self,\n        content_hash: \u0026ContentHash,\n    ) -\u003e Result\u003cOption\u003cFileRecord\u003e, RepositoryError\u003e {\n        self.as_ref().find_file_by_content_hash(content_hash)\n    }\n\n    fn stats_since(\u0026self, recent_since: UnixTimestamp) -\u003e Result\u003cRepositoryStats, RepositoryError\u003e {\n        self.as_ref().stats_since(recent_since)\n    }\n}\n\n/// Aggregate metadata counts used by health and status views.\n#[derive(Debug, Copy, Clone, PartialEq, Eq)]\npub struct RepositoryStats {\n    /// Total logical files.\n    pub file_count: u64,\n    /// Total distinct tags.\n    pub tag_count: u64,\n    /// Total pinned files.\n    pub pinned_count: u64,\n    /// Files uploaded at or after the caller-supplied recent cutoff.\n    pub recent_upload_count: u64,\n}\n\n/// Durable result of writing a blob.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct BlobWriteOutcome {\n    /// Content hash of the streamed bytes.\n    pub content_hash: ContentHash,\n    /// Opaque durable storage handle.\n    pub handle: StorageHandle,\n    /// Number of bytes written.\n    pub size: FileSize,\n    /// True when existing bytes were reused.\n    pub deduplicated: bool,\n}\n\n/// Metadata needed to create a logical file record.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct NewFileRecord {\n    /// New file id.\n    pub id: FileId,\n    /// User-facing filename.\n    pub name: FileName,\n    /// Stored byte count.\n    pub size: FileSize,\n    /// Content hash of bytes.\n    pub content_hash: ContentHash,\n    /// MIME type.\n    pub mime_type: MimeType,\n    /// Opaque blob handle.\n    pub storage_handle: StorageHandle,\n    /// Upload time.\n    pub uploaded_at: UnixTimestamp,\n    /// Initial tags.\n    pub tags: Vec\u003cTag\u003e,\n    /// Initial pin position.\n    pub pinned_at: Option\u003cu32\u003e,\n}\n\n/// Identifier generation failure.\n#[derive(Debug, Error)]\n#[error(\"could not generate id: {message}\")]\npub struct IdGenerationError {\n    /// Stable diagnostic message.\n    pub message: String,\n}\n\n/// Blob storage failure.\n#[derive(Debug, Error)]\npub enum BlobStoreError {\n    /// The storage device has insufficient free space.\n    #[error(\n        \"insufficient storage: required {required_bytes} bytes, available {available_bytes} bytes\"\n    )]\n    InsufficientStorage {\n        /// Bytes needed to complete the write.\n        required_bytes: u64,\n        /// Bytes available at failure time.\n        available_bytes: u64,\n    },\n\n    /// The storage backend could not read the supplied stream.\n    #[error(\"could not read upload stream: {message}\")]\n    ReadFailed {\n        /// Stable diagnostic message.\n        message: String,\n    },\n\n    /// The storage backend could not write durable bytes.\n    #[error(\"could not write blob: {message}\")]\n    WriteFailed {\n        /// Stable diagnostic message.\n        message: String,\n    },\n\n    /// Cleanup failed after a later application step failed.\n    #[error(\"could not clean up unreferenced blob {handle}: {message}\")]\n    CleanupFailed {\n        /// Opaque storage handle.\n        handle: StorageHandle,\n        /// Stable diagnostic message.\n        message: String,\n    },\n}\n\n/// Metadata persistence failure.\n#[derive(Debug, Error)]\npub enum RepositoryError {\n    /// The repository could not acquire a write lock in time.\n    #[error(\"metadata store is busy\")]\n    Busy,\n\n    /// The repository rejected a conflicting write.\n    #[error(\"metadata conflict: {message}\")]\n    Conflict {\n        /// Stable diagnostic message.\n        message: String,\n    },\n\n    /// The requested record does not exist.\n    #[error(\"metadata record was not found\")]\n    NotFound,\n\n    /// The repository operation failed.\n    #[error(\"metadata operation failed: {message}\")]\n    OperationFailed {\n        /// Stable diagnostic message.\n        message: String,\n    },\n}\n","traces":[{"line":101,"address":[5124624],"length":1,"stats":{"Line":1}},{"line":102,"address":[],"length":0,"stats":{"Line":1}},{"line":105,"address":[],"length":0,"stats":{"Line":0}},{"line":106,"address":[4480874],"length":1,"stats":{"Line":0}},{"line":114,"address":[4481872,4482053,4482082],"length":1,"stats":{"Line":1}},{"line":115,"address":[],"length":0,"stats":{"Line":2}},{"line":118,"address":[],"length":0,"stats":{"Line":0}},{"line":119,"address":[],"length":0,"stats":{"Line":0}},{"line":122,"address":[5125392],"length":1,"stats":{"Line":1}},{"line":126,"address":[],"length":0,"stats":{"Line":1}},{"line":129,"address":[],"length":0,"stats":{"Line":1}},{"line":130,"address":[],"length":0,"stats":{"Line":1}}],"covered":8,"coverable":12},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tsspd","src","config.rs"],"content":"//! Daemon startup configuration helpers.\n\nuse std::net::{IpAddr, SocketAddr};\n\n/// Server configuration required to bind the daemon.\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct DaemonConfig {\n    /// IP address to bind.\n    pub bind: IpAddr,\n    /// TCP port to listen on.\n    pub port: u16,\n}\n\nimpl DaemonConfig {\n    /// Returns the socket address represented by the config.\n    #[must_use]\n    pub const fn socket_addr(\u0026self) -\u003e SocketAddr {\n        SocketAddr::new(self.bind, self.port)\n    }\n}\n\n/// Maps startup bind failures to concise user-facing messages.\n#[must_use]\npub fn bind_error_message(address: SocketAddr, error: \u0026std::io::Error) -\u003e String {\n    if error.kind() == std::io::ErrorKind::AddrInUse {\n        return format!(\n            \"port {} is already in use; choose another port with --port\",\n            address.port()\n        );\n    }\n\n    format!(\"could not bind {address}: {error}\")\n}\n","traces":[{"line":17,"address":[4363696],"length":1,"stats":{"Line":1}},{"line":18,"address":[4363715],"length":1,"stats":{"Line":1}},{"line":24,"address":[4363776],"length":1,"stats":{"Line":1}},{"line":25,"address":[4363802],"length":1,"stats":{"Line":1}},{"line":26,"address":[4364027],"length":1,"stats":{"Line":1}},{"line":28,"address":[4364017],"length":1,"stats":{"Line":1}},{"line":32,"address":[4363845],"length":1,"stats":{"Line":0}}],"covered":6,"coverable":7},{"path":["/","home","tunar_ssp","Documents","MyCode","projects","tssp","crates","tsspd","src","lib.rs"],"content":"//! HTTP daemon foundation for `tsspd`.\n//!\n//! The current server exposes lifecycle, status, upload, and web shell routes.\n//! HTTP handlers stay thin and delegate storage behavior to application\n//! services.\n\nmod config;\nmod status;\nmod upload;\nmod web;\n\nuse std::path::PathBuf;\nuse std::sync::Arc;\nuse std::time::Instant;\n\nuse axum::extract::DefaultBodyLimit;\nuse axum::routing::{get, post};\nuse axum::Router;\nuse serde::Serialize;\n\npub use config::{bind_error_message, DaemonConfig};\npub use status::{MetadataStatsProvider, RepositoryMetadataStatsProvider, StatusResponse};\npub use upload::{\n    ApplicationFileUploadProvider, FileRecordResponse, FileUploadProvider, HttpUploadError,\n    HttpUploadOutcome, HttpUploadRequest,\n};\n\nuse status::StaticMetadataStatsProvider;\nuse upload::StaticFileUploadProvider;\n\n/// Shared HTTP state.\n#[derive(Clone)]\npub struct HttpState {\n    started_at: Instant,\n    stats_provider: Arc\u003cdyn MetadataStatsProvider\u003e,\n    upload_provider: Arc\u003cdyn FileUploadProvider\u003e,\n    upload_temp_dir: PathBuf,\n}\n\nimpl HttpState {\n    /// Creates HTTP state using the current process start instant.\n    #[must_use]\n    pub fn new(started_at: Instant) -\u003e Self {\n        Self {\n            started_at,\n            stats_provider: Arc::new(StaticMetadataStatsProvider),\n            upload_provider: Arc::new(StaticFileUploadProvider),\n            upload_temp_dir: std::env::temp_dir(),\n        }\n    }\n\n    /// Creates HTTP state with a real metadata stats provider and no upload service.\n    #[must_use]\n    pub fn with_stats_provider(\n        started_at: Instant,\n        stats_provider: Arc\u003cdyn MetadataStatsProvider\u003e,\n    ) -\u003e Self {\n        Self::with_providers(\n            started_at,\n            stats_provider,\n            Arc::new(StaticFileUploadProvider),\n            std::env::temp_dir(),\n        )\n    }\n\n    /// Creates HTTP state with real providers.\n    #[must_use]\n    pub fn with_providers(\n        started_at: Instant,\n        stats_provider: Arc\u003cdyn MetadataStatsProvider\u003e,\n        upload_provider: Arc\u003cdyn FileUploadProvider\u003e,\n        upload_temp_dir: PathBuf,\n    ) -\u003e Self {\n        Self {\n            started_at,\n            stats_provider,\n            upload_provider,\n            upload_temp_dir,\n        }\n    }\n}\n\n/// Builds the daemon router.\npub fn build_router(state: HttpState) -\u003e Router {\n    Router::new()\n        .route(\n            \"/api/v1/files\",\n            post(upload::upload_file).layer(DefaultBodyLimit::disable()),\n        )\n        .route(\"/healthz\", get(status::healthz))\n        .route(\"/readyz\", get(status::readyz))\n        .route(\"/api/v1/status\", get(status::status))\n        .fallback(web::web_fallback)\n        .with_state(state)\n}\n\n#[derive(Debug, Serialize)]\nstruct ErrorResponse {\n    error: ErrorBody,\n}\n\n#[derive(Debug, Serialize)]\nstruct ErrorBody {\n    code: \u0026'static str,\n    message: String,\n}\n\n#[cfg(test)]\nmod tests {\n    use std::io::Read;\n    use std::net::{IpAddr, Ipv4Addr};\n    use std::sync::Arc;\n    use std::time::Instant;\n\n    use axum::body::{to_bytes, Body};\n    use axum::http::header::CONTENT_TYPE;\n    use axum::http::{Request, StatusCode};\n    use tempfile::tempdir;\n    use tower::ServiceExt;\n    use tssp_adapter_fs::FilesystemBlobStore;\n    use tssp_adapter_sqlite::SqliteFileRepository;\n    use tssp_adapter_system::{SystemClock, UuidV7FileIdGenerator};\n    use tssp_app::UploadService;\n    use tssp_domain::{\n        ContentHash, FileId, FileName, FileRecord, FileSize, MimeType, StorageHandle, Tag,\n        UnixTimestamp,\n    };\n\n    use super::{\n        bind_error_message, build_router, ApplicationFileUploadProvider, DaemonConfig,\n        FileUploadProvider, HttpState, HttpUploadError, HttpUploadOutcome, HttpUploadRequest,\n        MetadataStatsProvider, RepositoryMetadataStatsProvider,\n    };\n    use tssp_ports::RepositoryStats;\n\n    #[test]\n    fn config_builds_socket_address() {\n        let config = DaemonConfig {\n            bind: IpAddr::V4(Ipv4Addr::LOCALHOST),\n            port: 8421,\n        };\n\n        assert_eq!(config.socket_addr().to_string(), \"127.0.0.1:8421\");\n    }\n\n    #[tokio::test]\n    async fn health_endpoint_returns_plain_ok() {\n        let app = build_router(HttpState::new(Instant::now()));\n        let response = app\n            .oneshot(\n                Request::builder()\n                    .uri(\"/healthz\")\n                    .body(Body::empty())\n                    .unwrap_or_else(|error| panic!(\"request build failed: {error}\")),\n            )\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::OK);\n        let body = to_bytes(response.into_body(), 64)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        assert_eq!(body.as_ref(), b\"ok\");\n    }\n\n    #[tokio::test]\n    async fn status_endpoint_returns_schema_version() {\n        let app = build_router(HttpState::with_stats_provider(\n            Instant::now(),\n            Arc::new(FixedStatsProvider),\n        ));\n        let response = app\n            .oneshot(\n                Request::builder()\n                    .uri(\"/api/v1/status\")\n                    .body(Body::empty())\n                    .unwrap_or_else(|error| panic!(\"request build failed: {error}\")),\n            )\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::OK);\n        let body = to_bytes(response.into_body(), 1024)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        let parsed: serde_json::Value = serde_json::from_slice(\u0026body)\n            .unwrap_or_else(|error| panic!(\"json parse failed: {error}\"));\n        assert_eq!(parsed[\"schema_version\"], 1);\n        assert_eq!(parsed[\"file_count\"], 7);\n        assert_eq!(parsed[\"tag_count\"], 3);\n    }\n\n    #[tokio::test]\n    async fn status_endpoint_reports_metadata_failure() {\n        let app = build_router(HttpState::with_stats_provider(\n            Instant::now(),\n            Arc::new(FailingStatsProvider),\n        ));\n        let response = app\n            .oneshot(\n                Request::builder()\n                    .uri(\"/api/v1/status\")\n                    .body(Body::empty())\n                    .unwrap_or_else(|error| panic!(\"request build failed: {error}\")),\n            )\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::SERVICE_UNAVAILABLE);\n        let body = to_bytes(response.into_body(), 1024)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        let parsed: serde_json::Value = serde_json::from_slice(\u0026body)\n            .unwrap_or_else(|error| panic!(\"json parse failed: {error}\"));\n        assert_eq!(parsed[\"error\"][\"code\"], \"metadata_unavailable\");\n    }\n\n    #[tokio::test]\n    async fn upload_endpoint_accepts_single_multipart_file() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let app = build_router(HttpState::with_providers(\n            Instant::now(),\n            Arc::new(FixedStatsProvider),\n            Arc::new(EchoUploadProvider {\n                deduplicated: false,\n            }),\n            temp.path().to_path_buf(),\n        ));\n        let response = app\n            .oneshot(multipart_request(\n                \"--tssp\\r\\n\\\n                 Content-Disposition: form-data; name=\\\"tag\\\"\\r\\n\\r\\n\\\n                 Docs\\r\\n\\\n                 --tssp\\r\\n\\\n                 Content-Disposition: form-data; name=\\\"pin\\\"\\r\\n\\r\\n\\\n                 true\\r\\n\\\n                 --tssp\\r\\n\\\n                 Content-Disposition: form-data; name=\\\"file\\\"; filename=\\\"note.txt\\\"\\r\\n\\\n                 Content-Type: text/plain\\r\\n\\r\\n\\\n                 hello upload\\r\\n\\\n                 --tssp--\\r\\n\",\n            ))\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::CREATED);\n        assert_eq!(\n            response.headers().get(\"x-tssp-deduplicated\"),\n            Some(\n                \u0026\"false\"\n                    .parse()\n                    .unwrap_or_else(|error| panic!(\"header parse failed: {error}\"))\n            )\n        );\n        let body = to_bytes(response.into_body(), 2048)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        let parsed: serde_json::Value = serde_json::from_slice(\u0026body)\n            .unwrap_or_else(|error| panic!(\"json parse failed: {error}\"));\n        assert_eq!(parsed[\"id\"], \"file-test\");\n        assert_eq!(parsed[\"name\"], \"note.txt\");\n        assert_eq!(parsed[\"mime_type\"], \"text/plain\");\n        assert_eq!(parsed[\"tags\"][0], \"Docs\");\n        assert_eq!(parsed[\"pinned\"], true);\n    }\n\n    #[tokio::test]\n    async fn upload_endpoint_returns_ok_for_deduplicated_content() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let app = build_router(HttpState::with_providers(\n            Instant::now(),\n            Arc::new(FixedStatsProvider),\n            Arc::new(EchoUploadProvider { deduplicated: true }),\n            temp.path().to_path_buf(),\n        ));\n        let response = app\n            .oneshot(multipart_request(\n                \"--tssp\\r\\n\\\n                 Content-Disposition: form-data; name=\\\"file\\\"; filename=\\\"note.txt\\\"\\r\\n\\\n                 Content-Type: text/plain\\r\\n\\r\\n\\\n                 hello upload\\r\\n\\\n                 --tssp--\\r\\n\",\n            ))\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::OK);\n        assert_eq!(\n            response.headers().get(\"x-tssp-deduplicated\"),\n            Some(\n                \u0026\"true\"\n                    .parse()\n                    .unwrap_or_else(|error| panic!(\"header parse failed: {error}\"))\n            )\n        );\n    }\n\n    #[tokio::test]\n    async fn upload_endpoint_rejects_missing_file_field() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let app = build_router(HttpState::with_providers(\n            Instant::now(),\n            Arc::new(FixedStatsProvider),\n            Arc::new(EchoUploadProvider {\n                deduplicated: false,\n            }),\n            temp.path().to_path_buf(),\n        ));\n        let response = app\n            .oneshot(multipart_request(\n                \"--tssp\\r\\n\\\n                 Content-Disposition: form-data; name=\\\"tag\\\"\\r\\n\\r\\n\\\n                 Docs\\r\\n\\\n                 --tssp--\\r\\n\",\n            ))\n            .await\n            .unwrap_or_else(|error| panic!(\"request failed: {error}\"));\n\n        assert_eq!(response.status(), StatusCode::BAD_REQUEST);\n        let body = to_bytes(response.into_body(), 2048)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        let parsed: serde_json::Value = serde_json::from_slice(\u0026body)\n            .unwrap_or_else(|error| panic!(\"json parse failed: {error}\"));\n        assert_eq!(parsed[\"error\"][\"code\"], \"invalid_request\");\n    }\n\n    #[tokio::test]\n    async fn upload_endpoint_persists_file_and_returns_existing_record_on_duplicate() {\n        let temp = tempdir().unwrap_or_else(|error| panic!(\"tempdir failed: {error}\"));\n        let repository = Arc::new(\n            SqliteFileRepository::open(temp.path().join(\"metadata.sqlite3\"))\n                .unwrap_or_else(|error| panic!(\"repository open failed: {error}\")),\n        );\n        let storage = Arc::new(\n            FilesystemBlobStore::new(temp.path().join(\"storage\"))\n                .unwrap_or_else(|error| panic!(\"blob store open failed: {error}\")),\n        );\n        let stats_provider = RepositoryMetadataStatsProvider::new(repository.clone(), SystemClock);\n        let upload_service =\n            UploadService::new(storage, repository, UuidV7FileIdGenerator, SystemClock);\n        let app = build_router(HttpState::with_providers(\n            Instant::now(),\n            Arc::new(stats_provider),\n            Arc::new(ApplicationFileUploadProvider::new(upload_service)),\n            temp.path().join(\"http-upload-tmp\"),\n        ));\n\n        let first = app\n            .clone()\n            .oneshot(multipart_request(REAL_UPLOAD_BODY))\n            .await\n            .unwrap_or_else(|error| panic!(\"first request failed: {error}\"));\n        assert_eq!(first.status(), StatusCode::CREATED);\n        let first_body = response_json(first).await;\n        let first_id = first_body[\"id\"]\n            .as_str()\n            .unwrap_or_else(|| panic!(\"first id is missing\"));\n\n        let second = app\n            .clone()\n            .oneshot(multipart_request(DUPLICATE_UPLOAD_BODY))\n            .await\n            .unwrap_or_else(|error| panic!(\"second request failed: {error}\"));\n        assert_eq!(second.status(), StatusCode::OK);\n        assert_eq!(\n            second.headers().get(\"x-tssp-deduplicated\"),\n            Some(\n                \u0026\"true\"\n                    .parse()\n                    .unwrap_or_else(|error| panic!(\"header parse failed: {error}\"))\n            )\n        );\n        let second_body = response_json(second).await;\n        assert_eq!(second_body[\"id\"].as_str(), Some(first_id));\n        assert_eq!(second_body[\"name\"].as_str(), Some(\"note.txt\"));\n        assert_eq!(second_body[\"content_hash\"], first_body[\"content_hash\"]);\n\n        let status = app\n            .oneshot(status_request())\n            .await\n            .unwrap_or_else(|error| panic!(\"status request failed: {error}\"));\n        let status_body = response_json(status).await;\n        assert_eq!(status_body[\"file_count\"], 1);\n        assert_eq!(status_body[\"recent_upload_count_24h\"], 1);\n    }\n\n    #[test]\n    fn bind_error_mentions_busy_port() {\n        let message = bind_error_message(\n            \"127.0.0.1:8421\"\n                .parse()\n                .unwrap_or_else(|error| panic!(\"socket parse failed: {error}\")),\n            \u0026std::io::Error::from(std::io::ErrorKind::AddrInUse),\n        );\n\n        assert!(message.contains(\"8421\"));\n        assert!(message.contains(\"--port\"));\n    }\n\n    struct FixedStatsProvider;\n\n    impl MetadataStatsProvider for FixedStatsProvider {\n        fn stats(\u0026self) -\u003e Result\u003cRepositoryStats, String\u003e {\n            Ok(RepositoryStats {\n                file_count: 7,\n                tag_count: 3,\n                pinned_count: 2,\n                recent_upload_count: 1,\n            })\n        }\n    }\n\n    struct FailingStatsProvider;\n\n    impl MetadataStatsProvider for FailingStatsProvider {\n        fn stats(\u0026self) -\u003e Result\u003cRepositoryStats, String\u003e {\n            Err(\"metadata database is unavailable\".to_owned())\n        }\n    }\n\n    struct EchoUploadProvider {\n        deduplicated: bool,\n    }\n\n    impl FileUploadProvider for EchoUploadProvider {\n        fn upload(\n            \u0026self,\n            mut request: HttpUploadRequest,\n        ) -\u003e Result\u003cHttpUploadOutcome, HttpUploadError\u003e {\n            let mut bytes = Vec::new();\n            request\n                .source\n                .read_to_end(\u0026mut bytes)\n                .map_err(|error| HttpUploadError::Internal {\n                    message: error.to_string(),\n                })?;\n            if bytes != b\"hello upload\" {\n                return Err(HttpUploadError::InvalidRequest {\n                    message: \"unexpected test upload bytes\".to_owned(),\n                });\n            }\n\n            Ok(HttpUploadOutcome {\n                record: test_record(\u0026request),\n                deduplicated: self.deduplicated,\n            })\n        }\n    }\n\n    fn multipart_request(body: \u0026'static str) -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .method(\"POST\")\n            .uri(\"/api/v1/files\")\n            .header(CONTENT_TYPE, \"multipart/form-data; boundary=tssp\")\n            .body(Body::from(body))\n            .unwrap_or_else(|error| panic!(\"request build failed: {error}\"))\n    }\n\n    fn status_request() -\u003e Request\u003cBody\u003e {\n        Request::builder()\n            .method(\"GET\")\n            .uri(\"/api/v1/status\")\n            .body(Body::empty())\n            .unwrap_or_else(|error| panic!(\"request build failed: {error}\"))\n    }\n\n    async fn response_json(response: axum::response::Response) -\u003e serde_json::Value {\n        let body = to_bytes(response.into_body(), 4096)\n            .await\n            .unwrap_or_else(|error| panic!(\"body read failed: {error}\"));\n        serde_json::from_slice(\u0026body).unwrap_or_else(|error| panic!(\"json parse failed: {error}\"))\n    }\n\n    const REAL_UPLOAD_BODY: \u0026str = \"--tssp\\r\\n\\\n        Content-Disposition: form-data; name=\\\"tag\\\"\\r\\n\\r\\n\\\n        Docs\\r\\n\\\n        --tssp\\r\\n\\\n        Content-Disposition: form-data; name=\\\"pin\\\"\\r\\n\\r\\n\\\n        TRUE\\r\\n\\\n        --tssp\\r\\n\\\n        Content-Disposition: form-data; name=\\\"file\\\"; filename=\\\"note.txt\\\"\\r\\n\\\n        Content-Type: text/plain\\r\\n\\r\\n\\\n        hello upload\\r\\n\\\n        --tssp--\\r\\n\";\n\n    const DUPLICATE_UPLOAD_BODY: \u0026str = \"--tssp\\r\\n\\\n        Content-Disposition: form-data; name=\\\"file\\\"; filename=\\\"other.txt\\\"\\r\\n\\\n        Content-Type: text/plain\\r\\n\\r\\n\\\n        hello upload\\r\\n\\\n        --tssp--\\r\\n\";\n\n    fn test_record(request: \u0026HttpUploadRequest) -\u003e FileRecord {\n        FileRecord {\n            id: file_id(\"file-test\"),\n            name: filename(\u0026request.filename),\n            size: FileSize::new(12),\n            content_hash: content_hash(),\n            mime_type: mime_type(\n                request\n                    .mime_type\n                    .as_deref()\n                    .unwrap_or(\"application/octet-stream\"),\n            ),\n            storage_handle: storage_handle(),\n            uploaded_at: timestamp(1_700_000_000),\n            tags: request.tags.iter().map(|tag| tag_value(tag)).collect(),\n            pinned_at: request.pinned.then_some(1),\n        }\n    }\n\n    fn file_id(value: \u0026str) -\u003e FileId {\n        FileId::new(value).unwrap_or_else(|error| panic!(\"invalid file id: {error}\"))\n    }\n\n    fn filename(value: \u0026str) -\u003e FileName {\n        FileName::new(value).unwrap_or_else(|error| panic!(\"invalid filename: {error}\"))\n    }\n\n    fn content_hash() -\u003e ContentHash {\n        ContentHash::new(\"abcdefabcdef0123456789abcdef0123456789abcdef0123456789abcdef0123\")\n            .unwrap_or_else(|error| panic!(\"invalid hash: {error}\"))\n    }\n\n    fn mime_type(value: \u0026str) -\u003e MimeType {\n        MimeType::new(value).unwrap_or_else(|error| panic!(\"invalid mime type: {error}\"))\n    }\n\n    fn storage_handle() -\u003e StorageHandle {\n        StorageHandle::new(\"blobs/ab/cd/abcdef\")\n            .unwrap_or_else(|error| panic!(\"invalid storage handle: {error}\"))\n    }\n\n    fn timestamp(seconds: i64) -\u003e UnixTimestamp {\n        UnixTimestamp::new(seconds).unwrap_or_else(|error| panic!(\"invalid timestamp: {error}\"))\n    }\n\n    fn tag_value(value: \u0026str) -\u003e Tag {\n        Tag::new(value).unwrap_or_else(|error| panic!(\"invalid tag: {error}\"))\n    }\n}\n","traces":[{"line":43,"address":[5714272,5714562,5714556],"length":1,"stats":{"Line":1}},{"line":46,"address":[4426131],"length":1,"stats":{"Line":1}},{"line":47,"address":[4426204,4426153],"length":1,"stats":{"Line":2}},{"line":48,"address":[4426221],"length":1,"stats":{"Line":1}},{"line":54,"address":[4426057,4425744,4426051],"length":1,"stats":{"Line":2}},{"line":59,"address":[4425798],"length":1,"stats":{"Line":2}},{"line":60,"address":[4425808],"length":1,"stats":{"Line":2}},{"line":61,"address":[4425823,4425878] long,\n        value_name = \"PATH\",\n        default_value = \"data\",\n        env = \"TSSPD_DATA_DIR\"\n    )]\n    data_dir: PathBuf,\n\n    /// Validate configuration and exit.\n    #[arg(long)]\n    check_config: bool,\n}\n\n#[tokio::main]\nasync fn main() -\u003e ExitCode {\n    match run(Cli::parse()).await {\n        Ok(()) =\u003e ExitCode::SUCCESS,\n        Err(message) =\u003e {\n            eprintln!(\"error: {message}\");\n            ExitCode::FAILURE\n        }\n    }\n}\n\nasync fn run(cli: Cli) -\u003e Result\u003c(), String\u003e {\n    let config = DaemonConfig {\n        bind: cli.bind,\n        port: cli.port,\n    };\n\n    if cli.check_config {\n        println!(\n            \"configuration ok: {}, data dir {}\",\n            config.socket_addr(),\n            cli.data_dir.display()\n        );\n        return Ok(());\n    }\n\n    std::fs::create_dir_all(\u0026cli.data_dir)\n        .map_err(|error| format!(\"could not create data directory: {error}\"))?;\n    let http_upload_temp_dir = cli.data_dir.join(\"http-upload-tmp\");\n    std::fs::create_dir_all(\u0026http_upload_temp_dir)\n        .map_err(|error| format!(\"could not create upload temp directory: {error}\"))?;\n    let metadata_path = cli.data_dir.join(\"metadata.sqlite3\");\n    let repository = Arc::new(\n        SqliteFileRepository::open(\u0026metadata_path)\n            .map_err(|error| format!(\"could not initialize metadata store: {error}\"))?,\n    );\n    let storage = Arc::new(\n        FilesystemBlobStore::new(cli.data_dir.join(\"storage\"))\n            .map_err(|error| format!(\"could not initialize blob storage: {error}\"))?,\n    );\n    let stats_provider = RepositoryMetadataStatsProvider::new(repository.clone(), SystemClock);\n    let upload_service =\n        UploadService::new(storage, repository, UuidV7FileIdGenerator, SystemClock);\n    let upload_provider = ApplicationFileUploadProvider::new(upload_service);\n\n    let address = config.socket_addr();\n    let listener = TcpListener::bind(address)\n        .await\n        .map_err(|error| bind_error_message(address, \u0026error))?;\n    let router = build_router(HttpState::with_providers(\n        Instant::now(),\n        Arc::new(stats_provider),\n        Arc::new(upload_provider),\n        http_upload_temp_dir,\n    ));\n\n    println!(\"tsspd listening on http://{address}\");\n    axum::serve(listener, router)\n        .await\n        .map_err(|error| format!(\"server failed: {error}\"))\n}\n","traces":[{"line":48,"address":[5264681,5264256,5264687],"length":1,"stats":{"Line":0}},{"line":49,"address":[5264553,5264314,5264444,5264374],"length":1,"stats":{"Line":0}},{"line":50,"address":[5039238],"length":1,"stats":{"Line":0}},{"line":51,"address":[5039171],"length":1,"stats":{"Line":0}},{"line":52,"address":[5039211,5039334],"length":1,"stats":{"Line":0}},{"line":53,"address":[5039405],"length":1,"stats":{"Line":0}},{"line":58,"address":[5032300,5032032,5032079,5035207,5036626,5036798,5032343],"length":1,"stats":{"Line":0}},{"line":60,"address":[5032204],"length":1,"stats":{"Line":0}},{"line":61,"address":[5032238],"length":1,"stats":{"Line":0}},{"line":64,"address":[5032292],"length":1,"stats":{"Line":0}},{"line":65,"address":[5035017],"length":1,"stats":{"Line":0}},{"line":70,"address":[5035184],"length":1,"stats":{"Line":0}},{"line":73,"address":[5032495,5032591,5034879,5032372],"length":1,"stats":{"Line":0}},{"line":74,"address":[5037723,5032488,5032559,5037696],"length":1,"stats":{"Line":0}},{"line":75,"address":[5032757,5032664],"length":1,"stats":{"Line":0}},{"line":76,"address":[5032986,5032800,5034851,5032890],"length":1,"stats":{"Line":0}},{"line":77,"address":[5038075,5032883,5038048,5032954],"length":1,"stats":{"Line":0}},{"line":78,"address":[5033059],"length":1,"stats":{"Line":0}},{"line":80,"address":[5034819,5033146,5033312,5033259],"length":1,"stats":{"Line":0}},{"line":81,"address":[5033236,5038294,5038272,5033280],"length":1,"stats":{"Line":0}},{"li  + Sync {\n    /// Returns the latest metadata stats.\n    ///\n    /// # Errors\n    ///\n    /// Returns a short diagnostic when counts cannot be read.\n    fn stats(\u0026self) -\u003e Result\u003cRepositoryStats, String\u003e;\n}\n\n#[derive(Debug)]\npub(crate) struct StaticMetadataStatsProvider;\n\nimpl MetadataStatsProvider for StaticMetadataStatsProvider {\n    fn stats(\u0026self) -\u003e Result\u003cRepositoryStats, String\u003e {\n        Ok(RepositoryStats {\n            file_count: 0,\n            tag_count: 0,\n            pinned_count: 0,\n            recent_upload_count: 0,\n        })\n    }\n}\n\n/// Metadata stats provider backed by a repository and clock.\n#[derive(Debug)]\npub struct RepositoryMetadataStatsProvider\u003cR, C\u003e {\n    repository: R,\n    clock: C,\n}\n\nimpl\u003cR, C\u003e RepositoryMetadataStatsProvider\u003cR, C\u003e {\n    /// Creates a repository-backed stats provider.\n    #[must_use]\n    pub const fn new(repository: R, clock: C) -\u003e Self {\n        Self { repository, clock }\n    }\n}\n\nimpl\u003cR, C\u003e MetadataStatsProvider for RepositoryMetadataStatsProvider\u003cR, C\u003e\nwhere\n    R: FileRepository + Send + Sync,\n    C: Clock + Send + Sync,\n{\n    fn stats(\u0026self) -\u003e Result\u003cRepositoryStats, String\u003e {\n        let now = self.clock.now();\n        let cutoff = now.seconds().saturating_sub(86_400);\n        let recent_since = UnixTimestamp::new(cutoff).map_err(|error| error.to_string())?;\n        self.repository\n            .stats_since(recent_since)\n            .map_err(|error| error.to_string())\n    }\n}\n\n/// Minimal status response consumed by `tssp status`.\n#[derive(Debug, Serialize)]\npub struct StatusResponse {\n    /// Stable response schema version.\n    pub schema_version: u8,\n    /// Daemon version.\n    pub version: \u0026'static str,\n    /// Human-readable health state.\n    pub status: \u0026'static str,\n    /// Seconds since process startup.\n    pub uptime_seconds: u64,\n    /// Indexed file count.\n    pub file_count: u64,\n    /// Known tag count.\n    pub tag_count: u64,\n    /// Pinned file count.\n    pub pinned_count: u64,\n    /// Uploads in the last 24 hours.\n    pub recent_upload_count_24h: u64,\n}\n\npub(crate) async fn healthz() -\u003e impl IntoResponse {\n    ([(CONTENT_TYPE, \"text/plain; charset=utf-8\")], \"ok\")\n}\n\npub(crate) async fn readyz() -\u003e impl IntoResponse {\n    ([(CONTENT_TYPE, \"text/plain; charset=utf-8\")], \"ready\")\n}\n\npub(crate) async fn status(State(state): State\u003cHttpState\u003e) -\u003e Response {\n    match state.stats_provider.stats() {\n        Ok(repository_stats) =\u003e Json(StatusResponse {\n            schema_version: 1,\n            version: env!(\"CARGO_PKG_VERSION\"),\n            status: \"ok\",\n            uptime_seconds: state.started_at.elapsed().as_secs(),\n            file_count: repository_stats.file_count,\n            tag_count: repository_stats.tag_count,\n            pinned_count: repository_stats.pinned_count,\n            recent_upload_count_24h: repository_stats.recent_upload_count,\n        })\n        .into_response(),\n        Err(message) =\u003e (\n            StatusCode::SERVICE_UNAVAILABLE,\n            Json(ErrorResponse {\n                error: ErrorBody {\n                    code: \"metadata_unavailable\",\n                    message,\n                },\n            }),\n        )\n            .into_response(),\n    }\n}\n","traces":[{"line":28,"address":[5789968],"length":1,"stats":{"Line":0}},{"line":29,"address":[4468888],"length":1,"stats":{"Line":0}},{"line":48,"address":[],"length":0,"stats":{"Line":1}},{"line":58,"address":[5133808],"length":1,"stats":{"Line":1}},{"line":59,"address":[],"length":0,"stats":{"Line":1}},{"line":60,"address":[4305963],"length":1,"stats":{"Line":1}},{"line":61,"address":[4305993,4306352,4306364],"length":1,"stats":{"Line":1}},{"line":62,"address":[],"length":0,"stats":{"Line":0}},{"line":63,"add
