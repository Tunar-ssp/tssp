name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

      - name: Format check
        run: cargo fmt --check

      - name: Build release
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Generate coverage report
        uses: xd009642/tarpaulin-action@v1
        with:
          args: '--workspace --lib --timeout 300 --out xml'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cobertura.xml

  frontend:
    name: Web Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run check
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: rust
    if: always()
    steps:
      - name: Download coverage
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: coverage
        continue-on-error: true

      - name: Display coverage summary
        run: |
          if [ -f cobertura.xml ]; then
            echo "Coverage report generated"
          else
            echo "Coverage report not available"
          fi
        continue-on-error: true

  check-workspace-version:
    name: Check workspace version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check [workspace.package] version
        id: check
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          # Handle the first push to a repository where 'before' might be all zeros
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial push detected. Enabling deploy."
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract version using a simple grep/sed to avoid python3/tomllib dependencies
          # which might not be available or compatible in all runner environments.
          OLD_VERSION=$(git show "$BEFORE:Cargo.toml" | grep -A 5 "\[workspace\.package\]" | grep "^version =" | cut -d '"' -f 2)
          NEW_VERSION=$(git show "$AFTER:Cargo.toml" | grep -A 5 "\[workspace\.package\]" | grep "^version =" | cut -d '"' -f 2)

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Workspace version changed from $OLD_VERSION to $NEW_VERSION. Deploy enabled."
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Workspace version did not change. Deploy skipped."
          fi

  build-arm64-release:
    name: Build ARM64 Release
    runs-on: ubuntu-24.04-arm
    needs: [rust, frontend, check-workspace-version]
    if: needs.check-workspace-version.outputs.version_changed == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build ARM64 backend
        run: cargo build -p tsspd --release

      - name: Package release
        run: |
          set -euo pipefail

          mkdir -p package
          cp target/release/tsspd package/tsspd

          # The frontend is already built into crates/tsspd/assets/web-v2
          # and potentially used at runtime or embedded.
          # We package it separately just in case the backend needs it on disk.
          if [ -d crates/tsspd/assets/web-v2 ]; then
            cp -r crates/tsspd/assets/web-v2 package/web-v2
          fi

          tar -czf tssp-linux-arm64.tar.gz -C package .

      - name: Upload ARM64 release artifact
        uses: actions/upload-artifact@v4
        with:
          name: tssp-linux-arm64
          path: tssp-linux-arm64.tar.gz
          retention-days: 7

  deploy-orange-pi:
    name: Deploy to Orange Pi
    runs-on: [self-hosted, Linux, ARM64]
    needs: [build-arm64-release, check-workspace-version]
    if: needs.check-workspace-version.outputs.version_changed == 'true'
    timeout-minutes: 10

    steps:
      - name: Download ARM64 release artifact
        uses: actions/download-artifact@v4
        with:
          name: tssp-linux-arm64

      - name: Deploy release
        run: |
          set -euo pipefail

          RELEASE_DIR="/opt/tssp/releases/${GITHUB_SHA}"

          mkdir -p "$RELEASE_DIR"
          tar -xzf tssp-linux-arm64.tar.gz -C "$RELEASE_DIR"

          chmod +x "$RELEASE_DIR/tsspd"

          rm -rf /opt/tssp/current
          ln -s "$RELEASE_DIR" /opt/tssp/current

          sudo systemctl restart tsspd

          echo "Deployed ${GITHUB_SHA} to Orange Pi"